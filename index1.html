<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POPPINS 數位錯題本</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    /* 列印專用樣式 */
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
      @page { margin: 1cm; size: A4 portrait; }
    }
    
    /* 避免觸控裝置上的橡皮筋效果與選取 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }
  </style>
</head>
<body class="bg-[#f4f7f8]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 常數與顏色 ---
    const THEME = {
      primary: '#0d4e4e',
      secondary: '#1a7575',
      bg: '#f4f7f8',
      white: '#ffffff',
      text: '#333333',
      red: '#e74c3c'
    };

    // --- IndexedDB 封裝 ---
    const DB_NAME = 'PoppinsMistakeDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'mistakes';

    const idb = {
      open: () => {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = (e) => reject('Database error: ' + e.target.errorCode);
          request.onsuccess = (e) => resolve(e.target.result);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
              store.createIndex('subject', 'subject', { unique: false });
              store.createIndex('timestamp', 'timestamp', { unique: false });
            }
          };
        });
      },
      add: async (item) => {
        const db = await idb.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction([STORE_NAME], 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const request = store.add(item);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      getAll: async () => {
        const db = await idb.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction([STORE_NAME], 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const request = store.getAll();
          request.onsuccess = () => {
            // Sort by timestamp descending
            const data = request.result.sort((a, b) => b.timestamp - a.timestamp);
            resolve(data);
          };
          request.onerror = () => reject(request.error);
        });
      },
      delete: async (id) => {
        const db = await idb.open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction([STORE_NAME], 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const request = store.delete(id);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

    // --- SVG 圖示組件 ---
    const Icons = {
      Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /></svg>,
      Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>,
      Upload: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>,
      Scissors: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><line x1="20" y1="4" x2="8.12" y2="15.88" /><line x1="14.47" y1="14.48" x2="20" y2="20" /><line x1="8.12" y1="8.12" x2="12" y2="12" /></svg>,
      Eraser: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" /><path d="M22 21H7" /><path d="m5 11 9 9" /></svg>,
      Wand: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z" /><path d="m14 7 3 3" /><path d="M5 6v4" /><path d="M19 14v4" /><path d="M10 2v2" /><path d="M7 8H3" /><path d="M21 16h-4" /><path d="M11 3H9" /></svg>,
      Trash: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>,
      Printer: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></svg>,
      ArrowLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
    };

    // --- 主應用程式元件 ---
    function App() {
      const [currentView, setCurrentView] = useState('login'); // login, dashboard, crop, edit, classify, form, list
      const [apiKey, setApiKey] = useState('');
      
      // 工作區狀態
      const [rawImage, setRawImage] = useState(null);
      const [croppedImage, setCroppedImage] = useState(null);
      const [editedImage, setEditedImage] = useState(null);
      
      // AI 分類結果
      const [aiAnalysis, setAiAnalysis] = useState({ subject: '', concept: '' });
      const [loadingMsg, setLoadingMsg] = useState('');

      useEffect(() => {
        const savedKey = localStorage.getItem('poppinsApiKey');
        if (savedKey) {
          setApiKey(savedKey);
          setCurrentView('dashboard');
        }
      }, []);

      const handleLogin = (key) => {
        if (key.trim().length > 10) {
          localStorage.setItem('poppinsApiKey', key.trim());
          setApiKey(key.trim());
          setCurrentView('dashboard');
        } else {
          alert('請輸入有效的 API Key');
        }
      };

      const logout = () => {
        localStorage.removeItem('poppinsApiKey');
        setApiKey('');
        setCurrentView('login');
      };

      const handleImageSelected = (dataUrl) => {
        setRawImage(dataUrl);
        setCurrentView('crop');
      };

      const callGeminiAI = async (base64Image) => {
        setLoadingMsg('AI 正在分析題目所屬單元...');
        setCurrentView('classify');
        
        try {
          const base64Data = base64Image.split(',')[1];
          
          const prompt = `你是一個台灣國中教育會考的專家。請分析這張錯題圖片，根據108課綱，判斷它的「科目」和「核心知識點」。
          請務必只回傳一個 JSON 格式的物件，不要包含其他文字說明或 Markdown 語法（例如 \`\`\`json ）。
          JSON 格式必須嚴格如下：
          {
            "subject": "科目名稱(例如：國文、數學、英文、理化、生物、地科、歷史、地理、公民)",
            "concept": "具體單元或核心知識點(例如：一元一次方程式、遺傳、台灣歷史等)"
          }`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: prompt },
                  { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                ]
              }],
              generationConfig: {
                 responseMimeType: "application/json"
              }
            })
          });

          if (!response.ok) throw new Error('API 呼叫失敗，請檢查網路或 API Key');

          const data = await response.json();
          const aiResponseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (aiResponseText) {
            let parsed = { subject: '未分類', concept: '未定單元' };
            try {
               const cleanedText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
               parsed = JSON.parse(cleanedText);
            } catch (e) {
               console.error("JSON Parse Error:", e, aiResponseText);
            }
            setAiAnalysis({
              subject: parsed.subject || '未分類',
              concept: parsed.concept || '未定單元'
            });
          }
        } catch (error) {
          console.error(error);
          alert('AI 分析失敗：' + error.message + '\n您可以手動輸入分類。');
          setAiAnalysis({ subject: '手動分類', concept: '' });
        }
        
        setLoadingMsg('');
        setCurrentView('form');
      };

      const saveMistake = async (formData) => {
        try {
          await idb.add({
            ...formData,
            image: editedImage || croppedImage,
            timestamp: Date.now()
          });
          alert('儲存成功！');
          setCurrentView('dashboard');
        } catch (e) {
          alert('儲存失敗：' + e);
        }
      };

      return (
        <div className="min-h-screen font-sans text-gray-800" style={{ backgroundColor: THEME.bg }}>
          {currentView === 'login' && <LoginView onLogin={handleLogin} />}
          {currentView === 'dashboard' && <DashboardView onSelectImage={handleImageSelected} onGoList={() => setCurrentView('list')} onLogout={logout} />}
          {currentView === 'crop' && <CropView imageUrl={rawImage} onCancel={() => setCurrentView('dashboard')} onComplete={(cropped) => { setCroppedImage(cropped); setCurrentView('edit'); }} />}
          {currentView === 'edit' && <EditView imageUrl={croppedImage} onCancel={() => setCurrentView('crop')} onComplete={(edited) => { setEditedImage(edited); callGeminiAI(edited); }} />}
          {currentView === 'classify' && <LoadingView message={loadingMsg} />}
          {currentView === 'form' && <FormView initialData={aiAnalysis} image={editedImage} onCancel={() => setCurrentView('edit')} onSave={saveMistake} />}
          {currentView === 'list' && <ListView onBack={() => setCurrentView('dashboard')} />}
        </div>
      );
    }

    // --- 各個畫面元件 ---

    function LoginView({ onLogin }) {
      const [inputKey, setInputKey] = useState('');
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6">
          <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-md text-center">
            <div className="bg-[#0d4e4e] text-white p-4 rounded-2xl inline-block mb-6 shadow-md">
              <Icons.Book />
            </div>
            <h1 className="text-3xl font-bold mb-2 text-[#0d4e4e]">POPPINS 錯題紀錄系統</h1>
            <h2 className="text-xl text-[#27ae60] mb-8 font-semibold">PRO 試用版</h2>
            
            <div className="text-left mb-6">
              <label className="block text-sm font-semibold text-gray-500 mb-2 flex justify-between items-center">
                <span>✨ GOOGLE AI API KEY</span>
                <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="text-[#0d4e4e] text-xs underline">前往免費申請</a>
              </label>
              <input 
                type="password" 
                placeholder="請貼上您的 API Key (AIza...)" 
                className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#0d4e4e]"
                value={inputKey}
                onChange={(e) => setInputKey(e.target.value)}
              />
            </div>

            <div className="bg-gray-50 p-4 rounded-xl text-sm text-left text-gray-600 mb-8 border border-gray-100 flex items-start gap-2">
               <span className="text-[#0d4e4e] mt-0.5"><Icons.Book /></span>
               <p>安全機制 (BYOK)：此 API Key 僅會儲存在您的本機裝置中，系統絕對不會將其傳送至任何外部伺服器。</p>
            </div>

            <button 
              onClick={() => onLogin(inputKey)}
              className="w-full bg-[#0d4e4e] text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-[#0a3d3d] transition-colors flex justify-center items-center gap-2"
            >
               進入系統
            </button>
          </div>
        </div>
      );
    }

    function DashboardView({ onSelectImage, onGoList, onLogout }) {
      const fileInputRef = useRef(null);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => onSelectImage(e.target.result);
          reader.readAsDataURL(file);
        }
      };

      return (
        <div className="min-h-screen flex flex-col p-6 max-w-4xl mx-auto">
          <header className="flex justify-between items-center mb-12 py-4">
            <div className="flex items-center gap-3">
              <div className="bg-[#0d4e4e] text-white p-2 rounded-lg"><Icons.Book /></div>
              <span className="font-bold text-[#0d4e4e] text-xl">POPPINS 數位錯題本</span>
            </div>
            <button onClick={onLogout} className="text-sm text-gray-500 hover:text-gray-800">登出</button>
          </header>

          <main className="flex-grow flex flex-col items-center justify-center text-center">
             <div className="bg-white p-6 rounded-3xl shadow-sm mb-8 inline-block text-[#0d4e4e]">
                <Icons.Wand />
             </div>
             <h1 className="text-4xl font-bold mb-2 text-gray-800 tracking-wide">POPPINS 錯題紀錄系統</h1>
             <h2 className="text-3xl text-[#27ae60] mb-6 font-bold">PRO 試用版</h2>
             <p className="text-gray-500 mb-12 tracking-widest">今天的努力，是為了遇見更好的自己。</p>

             <div className="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                <button 
                  onClick={() => fileInputRef.current.click()}
                  className="flex-1 bg-[#0d4e4e] text-white py-4 px-6 rounded-xl font-bold text-lg shadow-lg hover:bg-[#0a3d3d] transition-colors flex justify-center items-center gap-2"
                >
                  <Icons.Camera /> 開始製作
                </button>
                <button 
                  onClick={onGoList}
                  className="flex-1 bg-white text-[#0d4e4e] border-2 border-[#0d4e4e] py-4 px-6 rounded-xl font-bold text-lg hover:bg-gray-50 transition-colors flex justify-center items-center gap-2"
                >
                  <Icons.Book /> 檢視題本
                </button>
             </div>
             
             <input 
                type="file" 
                accept="image/*" 
                className="hidden" 
                ref={fileInputRef}
                onChange={handleFileChange}
             />
          </main>
        </div>
      );
    }

    function CropView({ imageUrl, onCancel, onComplete }) {
      const containerRef = useRef(null);
      const imgRef = useRef(null);
      const [cropBox, setCropBox] = useState({ x: 10, y: 10, width: 80, height: 80 });
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [dragType, setDragType] = useState(null);

      const startDrag = (e, type) => {
        e.preventDefault();
        setIsDragging(true);
        setDragType(type);
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        setDragStart({ x: clientX, y: clientY, initialBox: { ...cropBox } });
      };

      const onDrag = useCallback((e) => {
        if (!isDragging || !containerRef.current) return;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const containerRect = containerRef.current.getBoundingClientRect();
        const dx = ((clientX - dragStart.x) / containerRect.width) * 100;
        const dy = ((clientY - dragStart.y) / containerRect.height) * 100;
        
        let newBox = { ...dragStart.initialBox };

        if (dragType === 'move') {
          newBox.x = Math.max(0, Math.min(100 - newBox.width, newBox.x + dx));
          newBox.y = Math.max(0, Math.min(100 - newBox.height, newBox.y + dy));
        } else {
          if (dragType.includes('n')) {
            const maxY = newBox.y + newBox.height - 5;
            newBox.y = Math.max(0, Math.min(maxY, newBox.y + dy));
            newBox.height = dragStart.initialBox.height - (newBox.y - dragStart.initialBox.y);
          }
          if (dragType.includes('s')) {
            newBox.height = Math.max(5, Math.min(100 - newBox.y, newBox.height + dy));
          }
          if (dragType.includes('w')) {
             const maxX = newBox.x + newBox.width - 5;
             newBox.x = Math.max(0, Math.min(maxX, newBox.x + dx));
             newBox.width = dragStart.initialBox.width - (newBox.x - dragStart.initialBox.x);
          }
          if (dragType.includes('e')) {
             newBox.width = Math.max(5, Math.min(100 - newBox.x, newBox.width + dx));
          }
        }
        setCropBox(newBox);
      }, [isDragging, dragStart, dragType]);

      const endDrag = () => { setIsDragging(false); setDragType(null); };

      useEffect(() => {
        if (isDragging) {
          window.addEventListener('mousemove', onDrag);
          window.addEventListener('mouseup', endDrag);
          window.addEventListener('touchmove', onDrag, { passive: false });
          window.addEventListener('touchend', endDrag);
        }
        return () => {
          window.removeEventListener('mousemove', onDrag);
          window.removeEventListener('mouseup', endDrag);
          window.removeEventListener('touchmove', onDrag);
          window.removeEventListener('touchend', endDrag);
        };
      }, [isDragging, onDrag]);

      const handleConfirm = () => {
        const canvas = document.createElement('canvas');
        const img = imgRef.current;
        
        const cropX = (cropBox.x / 100) * img.naturalWidth;
        const cropY = (cropBox.y / 100) * img.naturalHeight;
        const cropW = (cropBox.width / 100) * img.naturalWidth;
        const cropH = (cropBox.height / 100) * img.naturalHeight;

        canvas.width = cropW;
        canvas.height = cropH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
        
        onComplete(canvas.toDataURL('image/jpeg', 0.9));
      };

      return (
        <div className="fixed inset-0 bg-black flex flex-col z-50">
          <div className="flex justify-between items-center p-4 text-white">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="font-bold">第一步：裁切題目</span>
            <div className="w-8"></div>
          </div>
          
          <div className="flex-grow relative overflow-hidden flex items-center justify-center p-4">
            <div ref={containerRef} className="relative w-full h-full max-w-3xl max-h-full">
                <img 
                  ref={imgRef} 
                  src={imageUrl} 
                  alt="To crop" 
                  className="absolute inset-0 w-full h-full object-contain pointer-events-none" 
                />
                <div 
                  className="absolute border-2 border-blue-500 shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]"
                  style={{
                    top: `${cropBox.y}%`, left: `${cropBox.x}%`, 
                    width: `${cropBox.width}%`, height: `${cropBox.height}%`,
                    touchAction: 'none'
                  }}
                >
                  <div className="absolute inset-0 cursor-move" onMouseDown={(e) => startDrag(e, 'move')} onTouchStart={(e) => startDrag(e, 'move')} />
                  <div className="absolute top-0 left-0 w-6 h-6 bg-blue-500 -mt-3 -ml-3 rounded-full cursor-nwse-resize z-10" onMouseDown={(e) => startDrag(e, 'nw')} onTouchStart={(e) => startDrag(e, 'nw')} />
                  <div className="absolute top-0 right-0 w-6 h-6 bg-blue-500 -mt-3 -mr-3 rounded-full cursor-nesw-resize z-10" onMouseDown={(e) => startDrag(e, 'ne')} onTouchStart={(e) => startDrag(e, 'ne')} />
                  <div className="absolute bottom-0 left-0 w-6 h-6 bg-blue-500 -mb-3 -ml-3 rounded-full cursor-nesw-resize z-10" onMouseDown={(e) => startDrag(e, 'sw')} onTouchStart={(e) => startDrag(e, 'sw')} />
                  <div className="absolute bottom-0 right-0 w-6 h-6 bg-blue-500 -mb-3 -mr-3 rounded-full cursor-nwse-resize z-10" onMouseDown={(e) => startDrag(e, 'se')} onTouchStart={(e) => startDrag(e, 'se')} />
                </div>
            </div>
          </div>

          <div className="p-6 bg-white rounded-t-3xl flex gap-4 justify-between items-center shadow-lg">
             <button onClick={onCancel} className="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold flex-1">重新選圖</button>
             <button onClick={handleConfirm} className="px-6 py-3 bg-[#0d4e4e] text-white rounded-xl font-bold flex-1 flex justify-center items-center gap-2">下一步 <Icons.Scissors/></button>
          </div>
        </div>
      );
    }

    function EditView({ imageUrl, onCancel, onComplete }) {
      const canvasRef = useRef(null);
      const [isErasing, setIsErasing] = useState(false);
      const [mode, setMode] = useState('none');

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          const maxWidth = 1200;
          let w = img.width;
          let h = img.height;
          if (w > maxWidth) {
            h = (maxWidth / w) * h;
            w = maxWidth;
          }
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);
        };
        img.src = imageUrl;
      }, [imageUrl]);

      const startDrawing = (e) => {
        if (mode !== 'eraser') return;
        setIsErasing(true);
        draw(e);
      };
      const stopDrawing = () => { setIsErasing(false); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); };
      const draw = (e) => {
        if (!isErasing || mode !== 'eraser') return;
        e.preventDefault();
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        ctx.lineWidth = 40 * scaleX;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ffffff';
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const handleRemoveRed = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          
          if (r > 130 && g < 100 && b < 100) {
            data[i] = 255;
            data[i+1] = 255;
            data[i+2] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      return (
        <div className="fixed inset-0 bg-gray-100 flex flex-col z-50">
           <div className="flex justify-between items-center p-4 bg-white shadow-sm z-10">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="font-bold">第二步：影像處理</span>
            <button onClick={() => onComplete(canvasRef.current.toDataURL('image/jpeg', 0.9))} className="px-4 py-2 bg-[#0d4e4e] text-white rounded-lg text-sm font-bold">
              完成
            </button>
          </div>

          <div className="flex-grow overflow-auto flex items-center justify-center p-4 touch-none">
            <canvas 
              ref={canvasRef}
              className="max-w-full max-h-full shadow-md bg-white border border-gray-300"
              style={{ touchAction: mode === 'eraser' ? 'none' : 'auto' }}
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseOut={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
            />
          </div>

          <div className="bg-white p-4 pb-8 flex justify-center gap-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
            <button 
              onClick={() => setMode(mode === 'eraser' ? 'none' : 'eraser')}
              className={`flex flex-col items-center gap-2 p-3 rounded-xl transition-colors ${mode === 'eraser' ? 'bg-[#0d4e4e] text-white' : 'text-gray-600 hover:bg-gray-100'}`}
            >
              <Icons.Eraser />
              <span className="text-xs font-bold">手動橡皮擦</span>
            </button>
            
            <button 
              onClick={handleRemoveRed}
              className="flex flex-col items-center gap-2 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors"
            >
              <Icons.Wand />
              <span className="text-xs font-bold">一鍵去紅筆</span>
            </button>
          </div>
        </div>
      );
    }

    function LoadingView({ message }) {
      return (
        <div className="fixed inset-0 bg-white bg-opacity-90 flex flex-col items-center justify-center z-50">
          <div className="animate-spin text-[#0d4e4e] mb-4">
            <Icons.Book /> 
          </div>
          <p className="text-lg font-bold text-[#0d4e4e]">{message}</p>
        </div>
      );
    }

    function FormView({ initialData, image, onCancel, onSave }) {
      const [formData, setFormData] = useState({
        subject: initialData.subject || '',
        concept: initialData.concept || '',
        notes: '',
        answer: ''
      });

      return (
        <div className="fixed inset-0 bg-gray-50 overflow-y-auto pb-20">
          <div className="bg-white p-4 shadow-sm sticky top-0 flex justify-between items-center z-10">
            <button onClick={onCancel} className="p-2 text-gray-500"><Icons.ArrowLeft /></button>
            <span className="font-bold text-lg">確認並儲存</span>
            <button onClick={() => onSave(formData)} className="px-5 py-2 bg-[#0d4e4e] text-white rounded-lg font-bold">
              儲存題本
            </button>
          </div>

          <div className="p-6 max-w-2xl mx-auto space-y-6">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
               <img src={image} alt="Processed" className="w-full object-contain rounded-lg max-h-64 border border-gray-200" />
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
              <div className="flex items-center gap-2 mb-4">
                <Icons.Wand /> <span className="font-bold text-[#0d4e4e]">AI 分類結果 (可手動修改)</span>
              </div>
              
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">科目</label>
                <input 
                  className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#0d4e4e] outline-none"
                  value={formData.subject}
                  onChange={e => setFormData({...formData, subject: e.target.value})}
                  placeholder="例如：數學、國文..."
                />
              </div>
              
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">核心知識點 / 單元</label>
                <input 
                  className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#0d4e4e] outline-none"
                  value={formData.concept}
                  onChange={e => setFormData({...formData, concept: e.target.value})}
                  placeholder="例如：一元一次方程式"
                />
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">正確解答 (選填)</label>
                <textarea 
                  className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#0d4e4e] outline-none h-24"
                  value={formData.answer}
                  onChange={e => setFormData({...formData, answer: e.target.value})}
                  placeholder="輸入正確答案..."
                />
              </div>
              
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">錯題筆記 / 訂正過程 (選填)</label>
                <textarea 
                  className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#0d4e4e] outline-none h-32"
                  value={formData.notes}
                  onChange={e => setFormData({...formData, notes: e.target.value})}
                  placeholder="為什麼會錯？下次要注意什麼？"
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ListView({ onBack }) {
      const [mistakes, setMistakes] = useState([]);
      const [filterSubject, setFilterSubject] = useState('All');
      
      const loadData = async () => {
        const data = await idb.getAll();
        setMistakes(data);
      };

      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if(window.confirm('確定要刪除這題嗎？')) {
          await idb.delete(id);
          loadData();
        }
      };

      const subjects = ['All', ...new Set(mistakes.map(m => m.subject))];
      const filteredData = filterSubject === 'All' ? mistakes : mistakes.filter(m => m.subject === filterSubject);

      const handlePrint = () => {
        window.print();
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-[#0d4e4e] text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center no-print">
            <button onClick={onBack} className="p-2"><Icons.ArrowLeft /></button>
            <h1 className="font-bold text-xl">我的數位錯題本</h1>
            <button onClick={handlePrint} className="bg-white text-[#0d4e4e] px-4 py-2 rounded-lg font-bold flex items-center gap-2">
              <Icons.Printer /> 輸出 PDF
            </button>
          </div>

          <div className="p-4 overflow-x-auto whitespace-nowrap bg-white border-b no-print">
            <div className="flex gap-2 max-w-4xl mx-auto">
              {subjects.map(sub => (
                <button 
                  key={sub}
                  onClick={() => setFilterSubject(sub)}
                  className={`px-4 py-2 rounded-full text-sm font-bold transition-colors ${filterSubject === sub ? 'bg-[#0d4e4e] text-white' : 'bg-gray-100 text-gray-600'}`}
                >
                  {sub}
                </button>
              ))}
            </div>
          </div>

          <div id="print-area" className="p-4 max-w-4xl mx-auto space-y-6">
            
            <div className="hidden print:block text-center mb-8 border-b-2 border-black pb-4">
              <h1 className="text-3xl font-bold">{filterSubject === 'All' ? '綜合' : filterSubject} 錯題本</h1>
              <p className="text-gray-500 mt-2">列印日期：{new Date().toLocaleDateString()}</p>
            </div>

            {filteredData.length === 0 ? (
               <div className="text-center py-20 text-gray-400 no-print">
                  <Icons.Book />
                  <p className="mt-4 text-lg">目前沒有錯題紀錄</p>
               </div>
            ) : (
              filteredData.map((item, index) => (
                <div key={item.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 print:shadow-none print:border-black print:mb-8 break-inside-avoid">
                  <div className="flex justify-between items-start mb-4">
                    <div className="flex flex-wrap gap-2">
                      <span className="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold">#{index + 1} {item.subject}</span>
                      <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-bold">{item.concept}</span>
                    </div>
                    <button onClick={() => handleDelete(item.id)} className="text-red-400 hover:text-red-600 p-2 no-print">
                      <Icons.Trash />
                    </button>
                  </div>
                  
                  <div className="mb-4">
                     <img src={item.image} alt="Question" className="max-w-full h-auto border border-gray-100 rounded-lg print:border-none" />
                  </div>

                  {(item.answer || item.notes) && (
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 print:border-dashed print:border-gray-400">
                      {item.answer && (
                        <div className="mb-3">
                          <span className="font-bold text-gray-700">解答：</span>
                          <span className="text-gray-800 whitespace-pre-wrap">{item.answer}</span>
                        </div>
                      )}
                      {item.notes && (
                        <div>
                          <span className="font-bold text-[#0d4e4e]">筆記：</span>
                          <p className="text-gray-600 whitespace-pre-wrap mt-1">{item.notes}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
