<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏆 決戰會考 錯題本</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    /* 列印專用樣式 - 強制純白背景 */
    @media print {
      body, html, #root, .min-h-screen, .bg-\[\#fffbeb\] { background-color: #ffffff !important; }
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; background-color: #ffffff !important; }
      .no-print { display: none !important; }
      @page { margin: 0.5cm; size: A4 portrait; }
      .print-card { padding: 0.5rem !important; margin-bottom: 2rem !important; border: none !important; box-shadow: none !important; background-color: #ffffff !important; }
      .print-img { width: 100% !important; max-height: none !important; object-fit: contain; }
      .print-header { margin-bottom: 1rem !important; padding-bottom: 0.5rem !important; }
    }
    
    /* 避免觸控裝置上的橡皮筋效果與選取 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }
  </style>
</head>
<body class="bg-[#fffbeb]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 暖色系主題常數 ---
    const THEME = {
      primary: '#f59e0b', // Amber 500
      primaryHover: '#d97706', // Amber 600
      textPrimary: '#b45309', // Amber 700
      textDark: '#451a03', // Amber 900
      bg: '#fffbeb', // Amber 50
      white: '#ffffff',
      red: '#ef4444' // Red 500
    };

    // --- SVG 圖示組件 ---
    const Icons = {
      Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /></svg>,
      Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>,
      Scissors: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><line x1="20" y1="4" x2="8.12" y2="15.88" /><line x1="14.47" y1="14.48" x2="20" y2="20" /><line x1="8.12" y1="8.12" x2="12" y2="12" /></svg>,
      Eraser: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" /><path d="M22 21H7" /><path d="m5 11 9 9" /></svg>,
      Wand: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z" /><path d="m14 7 3 3" /><path d="M5 6v4" /><path d="M19 14v4" /><path d="M10 2v2" /><path d="M7 8H3" /><path d="M21 16h-4" /><path d="M11 3H9" /></svg>,
      Trash: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>,
      Printer: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></svg>,
      ArrowLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
      Contrast: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>,
      Cloud: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
      Settings: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      Close: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
      Undo: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>,
      Rotate: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      StatusDot: ({ color }) => <svg width="12" height="12" viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="8"/></svg>
    };

    // --- 主應用程式元件 ---
    function App() {
      // 系統與雲端狀態
      const [currentView, setCurrentView] = useState('login'); 
      const [apiKey, setApiKey] = useState('');
      const [currentProfile, setCurrentProfile] = useState(''); 
      const [fbConfig, setFbConfig] = useState(() => {
          const saved = localStorage.getItem('poppinsFbConfig');
          return saved ? JSON.parse(saved) : null;
      });
      const [FB, setFB] = useState(null); 
      const [user, setUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(false);
      const [dbError, setDbError] = useState('');
      
      // 工作區狀態
      const [rawImage, setRawImage] = useState(null);
      const [croppedImage, setCroppedImage] = useState(null);
      const [editedImage, setEditedImage] = useState(null);
      
      // AI 分類結果
      const [aiAnalysis, setAiAnalysis] = useState({ subject: '', sub_subject: '', concept: '' });
      const [loadingMsg, setLoadingMsg] = useState('');

      // --- 載入 Firebase 環境 ---
      useEffect(() => {
        if (!fbConfig) return; 

        setIsDbLoading(true);
        setDbError('');

        const loadFirebase = async () => {
          try {
            const fbApp = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js")')();
            const fbAuth = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js")')();
            const fbDb = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")')();
            
            const app = fbApp.initializeApp(fbConfig);
            const auth = fbAuth.getAuth(app);
            const db = fbDb.getFirestore(app);
            const appId = fbConfig.projectId || '2027-exam-app';

            setFB({ ...fbApp, ...fbAuth, ...fbDb, db, auth, appId });

            try {
               await fbAuth.signInAnonymously(auth);
            } catch (e) {
               setDbError("雲端認證失敗：" + e.message);
               setIsDbLoading(false);
            }

            fbAuth.onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setIsDbLoading(false);
            });

          } catch (e) {
            setDbError("加載 Firebase 模組失敗：" + e.message);
            setIsDbLoading(false);
          }
        };
        loadFirebase();
      }, [fbConfig]);

      useEffect(() => {
        const savedKey = localStorage.getItem('poppinsApiKey');
        if (savedKey) setApiKey(savedKey);
      }, []);

      const handleFbConfigSave = (config) => {
          localStorage.setItem('poppinsFbConfig', JSON.stringify(config));
          setFbConfig(config);
      };

      const handleLogin = (key, profile) => {
        setApiKey(key);
        setCurrentProfile(profile);
        setCurrentView('dashboard');
      };

      const logout = () => {
        setCurrentProfile('');
        setCurrentView('login');
      };

      const resetFbConfig = () => {
        if(window.confirm('確定要清除雲端資料庫設定嗎？這不會刪除雲端資料，但需重新輸入金鑰才能連線。')) {
           localStorage.removeItem('poppinsFbConfig');
           setFbConfig(null);
           setFB(null);
           setUser(null);
           setCurrentView('login');
        }
      };

      const handleImageSelected = (dataUrl) => {
        setRawImage(dataUrl);
        setCurrentView('crop');
      };

      // AI 分析
      const callGeminiAI = async (base64Image) => {
        setLoadingMsg('AI 正在準備分析中...');
        setCurrentView('classify');
        
        try {
          const base64Data = base64Image.split(',')[1];
          const prompt = `你是一個台灣國中教育會考的專家。請分析這張錯題圖片，根據108課綱，判斷它的「科目」、「次標題/單元」和「核心知識」。
          請務必只回傳一個 JSON 格式的物件，不要包含其他文字說明或 Markdown 語法（例如 \`\`\`json ）。
          
          特別注意：
          1. 「次標題/單元」請使用【概略性且單一性的大單元分類】。例如只要跟平行線、內錯角、同側內角、平行四邊形、特殊四邊形有關的題目，都一律歸類為「平行與四邊形」。請勿創造過多細碎的次標題，以利後續篩選。
          2. 「核心知識」只限使用【繁體中文】回答，不可夾雜英文或其他語言。

          JSON 格式必須嚴格如下：
          {
            "subject": "科目名稱(例如：國文、數學、英文、理化、生物、地科、歷史、地理、公民)",
            "sub_subject": "次標題/大單元(例如：平行與四邊形、一元一次方程式、遺傳規律、台灣歷史等)",
            "concept": "核心知識(具體考點，限繁體中文)"
          }`;

          const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
          if (!modelsRes.ok) throw new Error('無法取得模型清單，請確認 API Key 是否有效。');
          
          const modelsData = await modelsRes.json();
          const availableModels = modelsData.models ? modelsData.models.map(m => m.name.replace('models/', '')) : [];

          const preferredModels = ['gemini-2.5-flash', 'gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-pro', 'gemini-1.5-pro-latest'];
          let modelsToTry = preferredModels.filter(m => availableModels.includes(m));
          
          if (modelsToTry.length === 0) {
              modelsToTry = availableModels.filter(m => m.includes('gemini') && (m.includes('flash') || m.includes('pro') || m.includes('vision')));
          }
          if (modelsToTry.length === 0) throw new Error('您的 API Key 沒有權限使用任何支援影像分析的模型。');

          let successData = null;
          let lastErrorMsg = '';

          for (const targetModel of modelsToTry) {
            if (successData) break;
            
            const maxRetries = 3; 
            let delay = 2000; 

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              setLoadingMsg(`AI 分析中...\n(模型: ${targetModel}, 嘗試: ${attempt}/${maxRetries})`);
              
              try {
                const isOldVision = targetModel.includes('vision');
                const bodyPayload = {
                  contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }]
                };
                if (!isOldVision) bodyPayload.generationConfig = { responseMimeType: "application/json" };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(bodyPayload)
                });

                if (response.ok) {
                  successData = await response.json();
                  break; 
                } else {
                  const errData = await response.json().catch(() => ({}));
                  lastErrorMsg = errData.error?.message || `模型 ${targetModel} 回傳未知錯誤`;
                  
                  if (response.status === 503 || response.status === 429 || lastErrorMsg.includes('high demand')) {
                    if (attempt < maxRetries) {
                      setLoadingMsg(`伺服器目前滿載...\n系統將在 ${delay/1000} 秒後自動重試\n請稍候...`);
                      await new Promise(res => setTimeout(res, delay));
                      delay *= 2; continue; 
                    }
                  } else break;
                }
              } catch (e) {
                 lastErrorMsg = e.message;
                 if (attempt < maxRetries) {
                    setLoadingMsg(`網路連線不穩...\n將在 ${delay/1000} 秒後自動重試`);
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                 }
              }
            } 
          } 

          if (!successData) throw new Error(`所有可用模型經過多次重試後皆因高流量或無權限而失敗。\n最後錯誤原因：${lastErrorMsg}`);

          const aiResponseText = successData.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (aiResponseText) {
            let parsed = { subject: '未分類', sub_subject: '未分類單元', concept: '未定單元' };
            try {
               const cleanedText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
               parsed = JSON.parse(cleanedText);
            } catch (e) { console.error("JSON Parse Error:", e, aiResponseText); }
            setAiAnalysis({
              subject: parsed.subject || '未分類',
              sub_subject: parsed.sub_subject || '未分類單元',
              concept: parsed.concept || '未定知識點'
            });
          }
        } catch (error) {
          console.error(error);
          alert('AI 分析失敗：\n' + error.message + '\n\n您可以先手動輸入分類。');
          setAiAnalysis({ subject: '手動分類', concept: '' });
        }
        
        setLoadingMsg('');
        setCurrentView('form');
      };

      const saveMistake = async (formData) => {
        if (!user || !FB) return alert('尚未連線至雲端資料庫，無法儲存。');

        setLoadingMsg('正在同步至雲端資料庫...');
        setCurrentView('classify');

        try {
          const colRef = FB.collection(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`);
          await FB.addDoc(colRef, {
            ...formData,
            image: editedImage || croppedImage,
            timestamp: Date.now()
          });
          setLoadingMsg('');
          alert('儲存成功！已安全同步至雲端。');
          setCurrentView('dashboard');
        } catch (e) {
          setLoadingMsg('');
          alert('雲端儲存失敗：' + e.message);
          setCurrentView('form');
        }
      };

      if (!fbConfig) return <FbSetupView onSave={handleFbConfigSave} />;
      if (isDbLoading) return <LoadingView message="正在連線至雲端資料庫..." />;
      if (dbError) {
        return (
            <div className="min-h-screen font-sans text-gray-800 bg-[#fffbeb] flex items-center justify-center p-6">
               <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg text-center border-t-4 border-red-500">
                   <h2 className="text-2xl font-bold text-red-600 mb-4">資料庫連線失敗</h2>
                   <p className="text-gray-600 mb-6">{dbError}</p>
                   <button onClick={() => setFbConfig(null)} className="px-6 py-2 bg-gray-200 rounded-lg text-gray-700 font-bold hover:bg-gray-300">
                      重新設定 Firebase
                   </button>
               </div>
            </div>
        );
      }

      return (
        <div className="min-h-screen font-sans text-gray-800" style={{ backgroundColor: THEME.bg }}>
          {currentView === 'login' && <LoginView onLogin={handleLogin} onResetFb={resetFbConfig} savedKey={apiKey} />}
          {currentView === 'dashboard' && <DashboardView currentProfile={currentProfile} onSelectImage={handleImageSelected} onGoList={() => setCurrentView('list')} onLogout={logout} isDbConnected={user && FB} />}
          {currentView === 'crop' && <CropView imageUrl={rawImage} onCancel={() => setCurrentView('dashboard')} onComplete={(cropped) => { setCroppedImage(cropped); setCurrentView('edit'); }} onUpdateRawImage={setRawImage} />}
          {currentView === 'edit' && <EditView imageUrl={croppedImage} onCancel={() => setCurrentView('crop')} onComplete={(edited) => { setEditedImage(edited); callGeminiAI(edited); }} />}
          {currentView === 'classify' && <LoadingView message={loadingMsg} />}
          {currentView === 'form' && <FormView initialData={aiAnalysis} image={editedImage} onCancel={() => setCurrentView('edit')} onSave={saveMistake} />}
          {currentView === 'list' && <ListView currentProfile={currentProfile} onBack={() => setCurrentView('dashboard')} FB={FB} user={user} isDbConnected={user && FB} />}
        </div>
      );
    }

    // --- 設定、登入與首頁 ---
    function FbSetupView({ onSave }) {
        const [input, setInput] = useState('');
        const [error, setError] = useState('');

        const handleSave = () => {
            try {
                let cleanConfig = input.trim();
                if (!cleanConfig) throw new Error("請勿空白");
                const match = cleanConfig.match(/\{[\s\S]*\}/);
                if (match) cleanConfig = match[0];
                cleanConfig = cleanConfig.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":').replace(/'/g, '"').replace(/,\s*}/g, '}');
                const configObj = JSON.parse(cleanConfig);
                if (!configObj.apiKey || !configObj.projectId) throw new Error("缺少必要欄位 (apiKey, projectId)，請確認您貼上的是正確的 firebaseConfig 物件。");
                onSave(configObj);
            } catch (e) { setError("解析失敗，請確認格式正確。\n" + e.message); }
        };

        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#fffbeb]">
              <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-lg text-center">
                 <div className="bg-[#f59e0b] text-[#ffffff] p-5 rounded-2xl inline-block mb-6 shadow-md"><Icons.Settings /></div>
                 <h1 className="text-4xl font-bold mb-5 text-[#b45309]">雲端資料庫設定</h1>
                 <p className="text-gray-600 mb-6 text-base text-left leading-relaxed">
                   歡迎使用！為了啟用跨裝置雲端同步功能，請將您的 <strong>Firebase 專案設定 (firebaseConfig)</strong> 貼在下方。<br/><br/>
                   安全保證：這些資料將<strong className="text-red-500">僅儲存於您的瀏覽器 LocalStorage 中</strong>，絕對不會寫入原始碼或外洩。
                 </p>
                 <textarea
                    className="w-full p-5 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#f59e0b] text-base font-mono h-48 mb-5 shadow-inner"
                    placeholder={`{\n  "apiKey": "AIzaSy...",\n  "authDomain": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}`}
                    value={input} onChange={(e) => setInput(e.target.value)}
                 />
                 {error && <div className="text-red-500 text-base mb-5 text-left whitespace-pre-wrap font-bold bg-red-50 p-4 rounded-lg border border-red-100">{error}</div>}
                 <button onClick={handleSave} className="w-full bg-[#f59e0b] text-[#ffffff] py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-[#d97706] transition-colors flex justify-center items-center gap-2">
                    儲存設定並繼續
                 </button>
              </div>
            </div>
        );

    // --- 透視校正與影像處理 ---

    // 解 8x8 線性方程組 (用於計算透視變換矩陣)
    function solveMatrix(A, b) {
      const n = 8;
      for (let i = 0; i < n; i++) {
        let max = i;
        for (let j = i + 1; j < n; j++) if (Math.abs(A[j][i]) > Math.abs(A[max][i])) max = j;
        [A[i], A[max]] = [A[max], A[i]];
        [b[i], b[max]] = [b[max], b[i]];
        for (let j = i + 1; j < n; j++) {
          const factor = A[j][i] / A[i][i];
          b[j] -= factor * b[i];
          for (let k = i; k < n; k++) A[j][k] -= factor * A[i][k];
        }
      }
      const x = new Array(n).fill(0);
      for (let i = n - 1; i >= 0; i--) {
        let sum = b[i];
        for (let j = i + 1; j < n; j++) sum -= A[i][j] * x[j];
        x[i] = sum / A[i][i];
      }
      return x;
    }

    // 計算 Homography Matrix
    function getHomography(src, dst) {
      const A = [], B = [];
      for (let i = 0; i < 4; i++) {
        const u = dst[i].x, v = dst[i].y, x = src[i].x, y = src[i].y;
        A.push([u, v, 1, 0, 0, 0, -x * u, -x * v]); B.push(x);
        A.push([0, 0, 0, u, v, 1, -y * u, -y * v]); B.push(y);
      }
      return solveMatrix(A, B);
    }

    function CropView({ imageUrl, onCancel, onComplete, onUpdateRawImage }) {
      const containerRef = useRef(null);
      const imgRef = useRef(null);
      
      // 4 points for perspective crop: TL, TR, BR, BL
      const [pts, setPts] = useState([
        { x: 10, y: 10 }, { x: 90, y: 10 }, 
        { x: 90, y: 90 }, { x: 10, y: 90 }
      ]);
      const [draggingIdx, setDraggingIdx] = useState(null);

      const startDrag = (e, idx) => {
        e.preventDefault();
        setDraggingIdx(idx);
      };

      const onDrag = useCallback((e) => {
        if (draggingIdx === null || !containerRef.current) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = containerRef.current.getBoundingClientRect();
        
        let nx = ((clientX - rect.left) / rect.width) * 100;
        let ny = ((clientY - rect.top) / rect.height) * 100;
        nx = Math.max(0, Math.min(100, nx));
        ny = Math.max(0, Math.min(100, ny));

        setPts(prev => {
          const next = [...prev];
          next[draggingIdx] = { x: nx, y: ny };
          return next;
        });
      }, [draggingIdx]);

      const endDrag = () => setDraggingIdx(null);

      useEffect(() => {
        if (draggingIdx !== null) {
          window.addEventListener('mousemove', onDrag);
          window.addEventListener('mouseup', endDrag);
          window.addEventListener('touchmove', onDrag, { passive: false });
          window.addEventListener('touchend', endDrag);
        }
        return () => {
          window.removeEventListener('mousemove', onDrag);
          window.removeEventListener('mouseup', endDrag);
          window.removeEventListener('touchmove', onDrag);
          window.removeEventListener('touchend', endDrag);
        };
      }, [draggingIdx, onDrag]);

      // 旋轉 90 度功能
      const handleRotate = () => {
        const img = new Image();
        img.onload = () => {
          const cvs = document.createElement('canvas');
          cvs.width = img.height;
          cvs.height = img.width;
          const ctx = cvs.getContext('2d');
          ctx.translate(cvs.width / 2, cvs.height / 2);
          ctx.rotate(90 * Math.PI / 180);
          ctx.drawImage(img, -img.width / 2, -img.height / 2);
          onUpdateRawImage(cvs.toDataURL('image/jpeg', 1.0));
          // Reset points
          setPts([{ x: 10, y: 10 }, { x: 90, y: 10 }, { x: 90, y: 90 }, { x: 10, y: 90 }]);
        };
        img.src = imageUrl;
      };

      // 執行四點透視校正
      const handleConfirm = () => {
        const img = imgRef.current;
        const srcW = img.naturalWidth;
        const srcH = img.naturalHeight;

        // Convert percentage to actual pixels
        const srcPts = pts.map(p => ({ x: (p.x / 100) * srcW, y: (p.y / 100) * srcH }));

        // Calculate output dimensions
        const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        const outW = Math.round(Math.max(dist(srcPts[0], srcPts[1]), dist(srcPts[3], srcPts[2])));
        const outH = Math.round(Math.max(dist(srcPts[0], srcPts[3]), dist(srcPts[1], srcPts[2])));
        
        const dstPts = [{x:0, y:0}, {x:outW, y:0}, {x:outW, y:outH}, {x:0, y:outH}];
        const H_matrix = getHomography(srcPts, dstPts);

        // Draw original to hidden canvas to get pixel data
        const srcCvs = document.createElement('canvas');
        srcCvs.width = srcW; srcCvs.height = srcH;
        const srcCtx = srcCvs.getContext('2d');
        srcCtx.drawImage(img, 0, 0);
        const srcData = srcCtx.getImageData(0, 0, srcW, srcH).data;

        // Create destination canvas
        const dstCvs = document.createElement('canvas');
        dstCvs.width = outW; dstCvs.height = outH;
        const dstCtx = dstCvs.getContext('2d');
        const dstImgData = dstCtx.createImageData(outW, outH);
        const dstData = dstImgData.data;

        // Inverse mapping with Nearest Neighbor interpolation
        for (let y = 0; y < outH; y++) {
          for (let x = 0; x < outW; x++) {
            const z = H_matrix[6] * x + H_matrix[7] * y + 1;
            const sx = Math.round((H_matrix[0] * x + H_matrix[1] * y + H_matrix[2]) / z);
            const sy = Math.round((H_matrix[3] * x + H_matrix[4] * y + H_matrix[5]) / z);

            const dstIdx = (y * outW + x) * 4;
            if (sx >= 0 && sx < srcW && sy >= 0 && sy < srcH) {
              const srcIdx = (sy * srcW + sx) * 4;
              dstData[dstIdx] = srcData[srcIdx];
              dstData[dstIdx+1] = srcData[srcIdx+1];
              dstData[dstIdx+2] = srcData[srcIdx+2];
              dstData[dstIdx+3] = srcData[srcIdx+3];
            } else {
              dstData[dstIdx+3] = 0; // Transparent
            }
          }
        }
        dstCtx.putImageData(dstImgData, 0, 0);
        onComplete(dstCvs.toDataURL('image/jpeg', 0.9));
      };

      // 產生 SVG 多邊形字串 (將百分比轉為 viewBox 的絕對數值)
      const polygonPoints = pts.map(p => `${p.x},${p.y}`).join(' ');

      return (
        <div className="fixed inset-0 bg-gray-900 flex flex-col z-50">
          <div className="flex justify-between items-center p-5 text-white bg-gray-800 shadow-md z-20">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="text-lg font-bold">第一步：透視校正裁切</span>
            <button onClick={handleRotate} className="p-2 px-4 bg-gray-700 rounded-lg hover:bg-gray-600 transition-colors flex items-center gap-2 text-base font-bold"><Icons.Rotate /> 旋轉</button>
          </div>
          
          <div className="flex-grow relative overflow-hidden flex items-center justify-center p-4">
            <div ref={containerRef} className="relative inline-block touch-none" style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)' }}>
                <img 
                  ref={imgRef} src={imageUrl} alt="To crop" className="block pointer-events-none" 
                  style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)', width: 'auto', height: 'auto' }}
                />
                
                {/* SVG Mask overlay with viewBox to support absolute coordinates mapping */}
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                  <defs>
                    <mask id="crop-mask">
                      <rect width="100" height="100" fill="white" />
                      <polygon points={polygonPoints} fill="black" />
                    </mask>
                  </defs>
                  <rect width="100" height="100" fill="rgba(0,0,0,0.6)" mask="url(#crop-mask)" />
                  <polygon points={polygonPoints} fill="none" stroke="#f59e0b" strokeWidth="3" strokeDasharray="1,1" vectorEffect="non-scaling-stroke" />
                </svg>

                {/* Draggable corners */}
                <div className="absolute inset-0 z-20 pointer-events-none">
                  {pts.map((pt, i) => (
                     <div key={i} className="absolute w-10 h-10 bg-white border-4 border-[#f59e0b] rounded-full shadow-lg pointer-events-auto cursor-move transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center"
                          style={{ top: `${pt.y}%`, left: `${pt.x}%` }}
                          onMouseDown={(e) => startDrag(e, i)} onTouchStart={(e) => startDrag(e, i)}>
                          <div className="w-2 h-2 bg-[#f59e0b] rounded-full"></div>
                     </div>
                  ))}
                </div>
            </div>
          </div>

          <div className="p-6 bg-white rounded-t-3xl flex gap-5 justify-between items-center shadow-lg z-20">
             <button onClick={onCancel} className="px-6 py-4 bg-gray-100 text-gray-700 rounded-xl font-bold text-lg flex-1">重新選圖</button>
             <button onClick={handleConfirm} className="px-6 py-4 bg-[#f59e0b] text-[#ffffff] rounded-xl font-bold text-lg flex-1 flex justify-center items-center gap-2 hover:bg-[#d97706] transition-colors">下一步 <Icons.Scissors/></button>
          </div>
        </div>
      );
    }

    function EditView({ imageUrl, onCancel, onComplete }) {
      const canvasRef = useRef(null);
      const [isErasing, setIsErasing] = useState(false);
      const [mode, setMode] = useState('none');
      const historyRef = useRef([]); // 用於存放 Undo 的歷史紀錄
      const [canUndo, setCanUndo] = useState(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          const maxWidth = 1000;
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
          canvas.width = w; canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);
          // Initial state save
          historyRef.current = [];
          setCanUndo(false);
        };
        img.src = imageUrl;
      }, [imageUrl]);

      const saveState = () => {
        const cvs = canvasRef.current;
        historyRef.current.push(cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height));
        if (historyRef.current.length > 10) historyRef.current.shift(); // 最多存 10 步
        setCanUndo(true);
      };

      const handleUndo = () => {
        if (historyRef.current.length === 0) return;
        const cvs = canvasRef.current;
        const lastState = historyRef.current.pop();
        cvs.getContext('2d').putImageData(lastState, 0, 0);
        setCanUndo(historyRef.current.length > 0);
      };

      const startDrawing = (e) => {
        if (mode !== 'eraser') return;
        saveState(); // 畫下第一筆前儲存狀態
        setIsErasing(true);
        draw(e);
      };
      
      const stopDrawing = () => { setIsErasing(false); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); };
      
      const draw = (e) => {
        if (!isErasing || mode !== 'eraser') return;
        e.preventDefault();
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;
        ctx.lineWidth = 40 * scaleX;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ffffff';
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const handleRemoveRed = () => {
        saveState();
        const canvas = canvasRef.current, ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
          if (data[i] > 130 && data[i+1] < 100 && data[i+2] < 100) {
            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      const handleRemoveBackground = () => {
        saveState();
        const canvas = canvasRef.current, ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), data = imgData.data;
        const threshold = 170; 
        for (let i = 0; i < data.length; i += 4) {
          const luminance = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
          if (luminance > threshold) {
            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
          } else {
            data[i] = Math.max(0, data[i] - 40); data[i+1] = Math.max(0, data[i+1] - 40); data[i+2] = Math.max(0, data[i+2] - 40);
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      return (
        <div className="fixed inset-0 bg-gray-100 flex flex-col z-50">
           <div className="flex justify-between items-center p-5 bg-white shadow-sm z-10">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <div className="flex items-center gap-4">
               <span className="text-lg font-bold text-gray-800 hidden sm:inline">第二步：影像處理</span>
               {canUndo && (
                  <button onClick={handleUndo} className="flex items-center gap-2 text-base bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 font-bold transition-colors">
                     <Icons.Undo /> 復原
                  </button>
               )}
            </div>
            <button onClick={() => onComplete(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="px-5 py-2.5 bg-[#f59e0b] hover:bg-[#d97706] transition-colors text-[#ffffff] rounded-lg text-base font-bold">
              完成
            </button>
          </div>

          <div className="flex-grow overflow-auto flex items-center justify-center p-4 touch-none">
            <canvas ref={canvasRef} className="max-w-full max-h-full shadow-md bg-white border border-gray-300"
              style={{ touchAction: mode === 'eraser' ? 'none' : 'auto' }}
              onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing}
              onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
          </div>

          <div className="bg-white p-5 pb-8 flex justify-center gap-8 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
            <button onClick={() => setMode(mode === 'eraser' ? 'none' : 'eraser')}
              className={`flex flex-col items-center gap-2 p-3 rounded-xl transition-colors ${mode === 'eraser' ? 'bg-[#f59e0b] text-[#ffffff]' : 'text-gray-600 hover:bg-gray-100'}`}>
              <Icons.Eraser /><span className="text-sm font-bold">手動橡皮擦</span>
            </button>
            <button onClick={handleRemoveRed} className="flex flex-col items-center gap-2 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors">
              <Icons.Wand /><span className="text-sm font-bold">一鍵去紅筆</span>
            </button>
            <button onClick={handleRemoveBackground} className="flex flex-col items-center gap-2 p-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-colors">
              <Icons.Contrast /><span className="text-sm font-bold">一鍵去背景</span>
            </button>
          </div>
        </div>
      );
    }

    function LoadingView({ message }) {
      return (
        <div className="fixed inset-0 bg-white bg-opacity-95 flex flex-col items-center justify-center z-50 p-6 text-center">
          <div className="animate-spin text-[#d97706] mb-6 scale-150"><Icons.Cloud /></div>
          <p className="text-xl font-bold text-[#d97706] whitespace-pre-wrap leading-relaxed">{message}</p>
        </div>
      );
    }

    function FormView({ initialData, image, onCancel, onSave }) {
      const [formData, setFormData] = useState({
        subject: initialData.subject || '',
        sub_subject: initialData.sub_subject || '',
        concept: initialData.concept || '',
        notes: '',
        answer: '',
        mastery: 'need_review'
      });

      return (
        <div className="fixed inset-0 bg-gray-50 overflow-y-auto pb-20">
          <div className="bg-white p-5 shadow-sm sticky top-0 flex justify-between items-center z-10">
            <button onClick={onCancel} className="p-2 text-gray-500"><Icons.ArrowLeft /></button>
            <span className="font-bold text-xl text-gray-800">確認並儲存</span>
            <button onClick={() => onSave(formData)} className="px-6 py-2.5 bg-[#f59e0b] hover:bg-[#d97706] transition-colors text-[#ffffff] rounded-lg font-bold text-lg flex items-center gap-2">
              <Icons.Cloud /> 同步至雲端
            </button>
          </div>

          <div className="p-4 md:p-6 w-[98%] max-w-[1000px] mx-auto space-y-6">
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
               <img src={image} alt="Processed" className="w-full object-contain rounded-lg max-h-[400px] border border-gray-200 mx-auto" />
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-5">
              <div className="flex justify-between items-center mb-2">
                 <div className="flex items-center gap-2 text-xl"><Icons.Wand /> <span className="font-bold text-[#b45309]">AI 分類結果 (可手動修改)</span></div>
              </div>

              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">⭐ 熟練度標記</label>
                <div className="flex gap-4">
                   <label className={`flex-1 flex items-center justify-center gap-2 p-4 rounded-xl border-2 cursor-pointer transition-all ${formData.mastery === 'need_review' ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-gray-50'}`}>
                      <input type="radio" name="mastery" value="need_review" className="hidden" checked={formData.mastery === 'need_review'} onChange={(e) => setFormData({...formData, mastery: e.target.value})} />
                      <span className="text-2xl">🔴</span><span className="font-bold text-gray-700 text-lg">需再複習</span>
                   </label>
                   <label className={`flex-1 flex items-center justify-center gap-2 p-4 rounded-xl border-2 cursor-pointer transition-all ${formData.mastery === 'mastered' ? 'border-green-500 bg-green-50' : 'border-gray-200 bg-gray-50'}`}>
                      <input type="radio" name="mastery" value="mastered" className="hidden" checked={formData.mastery === 'mastered'} onChange={(e) => setFormData({...formData, mastery: e.target.value})} />
                      <span className="text-2xl">🟢</span><span className="font-bold text-gray-700 text-lg">已掌握</span>
                   </label>
                </div>
              </div>
              
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">科目</label>
                <input className="w-full p-4 text-lg border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#f59e0b] outline-none" value={formData.subject} onChange={e => setFormData({...formData, subject: e.target.value})} />
              </div>
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">次標題 / 大單元</label>
                <input className="w-full p-4 text-lg border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#f59e0b] outline-none" value={formData.sub_subject} onChange={e => setFormData({...formData, sub_subject: e.target.value})} />
              </div>
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">核心知識 (限繁體中文)</label>
                <input className="w-full p-4 text-lg border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#f59e0b] outline-none" value={formData.concept} onChange={e => setFormData({...formData, concept: e.target.value})} />
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-5">
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">正確解答 (選填)</label>
                <textarea className="w-full p-4 text-lg border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#f59e0b] outline-none h-32" value={formData.answer} onChange={e => setFormData({...formData, answer: e.target.value})} />
              </div>
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">錯題筆記 / 訂正過程 (選填)</label>
                <textarea className="w-full p-4 text-lg border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-[#f59e0b] outline-none h-40" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ListView({ currentProfile, onBack, FB, user, isDbConnected }) {
      const [mistakes, setMistakes] = useState([]);
      const [filterSubject, setFilterSubject] = useState('All');
      const [filterSubSubject, setFilterSubSubject] = useState('All');
      const [filterMastery, setFilterMastery] = useState('All'); 
      const [searchQuery, setSearchQuery] = useState(''); 
      const [isFetching, setIsFetching] = useState(true);
      
      useEffect(() => {
        if (!user || !FB || !currentProfile) return;
        setIsFetching(true);
        const colRef = FB.collection(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`);
        const unsubscribe = FB.onSnapshot(colRef, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setMistakes(data);
            setIsFetching(false);
        }, (error) => {
            console.error("雲端讀取錯誤:", error);
            setIsFetching(false);
        });
        return () => unsubscribe();
      }, [user, FB, currentProfile]);

      const handleDelete = async (id) => {
        if (!user || !FB || !currentProfile) return;
        if(window.confirm('確定要從雲端刪除這題嗎？(刪除後無法復原)')) {
          try { await FB.deleteDoc(FB.doc(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`, id)); } 
          catch(e) { alert('刪除失敗'); }
        }
      };

      // 在列表切換熟練度狀態
      const handleUpdateMastery = async (id, currentMastery) => {
        if (!user || !FB || !currentProfile) return;
        const newMastery = (!currentMastery || currentMastery === 'need_review') ? 'mastered' : 'need_review';
        try {
          await FB.updateDoc(FB.doc(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`, id), {
            mastery: newMastery
          });
        } catch (e) {
          console.error(e);
          alert('狀態更新失敗');
        }
      };

      const handleSubjectChange = (sub) => { setFilterSubject(sub); setFilterSubSubject('All'); };

      const subjects = ['All', ...new Set(mistakes.map(m => m.subject))];
      const availableSubSubjects = filterSubject === 'All' ? [] : ['All', ...new Set(mistakes.filter(m => m.subject === filterSubject).map(m => m.sub_subject || '未分類單元'))];

      let filteredData = mistakes;
      if (filterSubject !== 'All') filteredData = filteredData.filter(m => m.subject === filterSubject);
      if (filterSubSubject !== 'All') filteredData = filteredData.filter(m => (m.sub_subject || '未分類單元') === filterSubSubject);
      if (filterMastery !== 'All') filteredData = filteredData.filter(m => (m.mastery || 'need_review') === filterMastery);
      if (searchQuery.trim()) {
         const q = searchQuery.toLowerCase().trim();
         filteredData = filteredData.filter(m => 
            (m.concept && m.concept.toLowerCase().includes(q)) || 
            (m.notes && m.notes.toLowerCase().includes(q)) ||
            (m.sub_subject && m.sub_subject.toLowerCase().includes(q)) ||
            (m.subject && m.subject.toLowerCase().includes(q))
         );
      }

      const handlePrint = () => { setTimeout(() => { window.print(); }, 100); };

      if (isFetching) return <LoadingView message={`正在從雲端載入 ${currentProfile} 的錯題本...`} />;

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-[#f59e0b] text-[#ffffff] p-5 sticky top-0 z-10 shadow-md flex justify-between items-center no-print">
            <button onClick={onBack} className="p-2 hover:bg-[#d97706] rounded-full transition-colors"><Icons.ArrowLeft /></button>
            <div className="flex items-center gap-2">
               <h1 className="font-bold text-xl sm:text-2xl truncate max-w-[200px] sm:max-w-xs">{currentProfile} 的雲端錯題本</h1>
               <div title="雲端連線狀態" className="ml-1"><Icons.StatusDot color={isDbConnected ? "#4ade80" : "#ef4444"} /></div>
            </div>
            <button onClick={handlePrint} className="bg-white text-[#451a03] px-4 py-2.5 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-50 transition-colors shadow-sm text-base">
              <Icons.Printer /> <span className="hidden sm:inline">輸出 PDF</span>
            </button>
          </div>

          <div className="p-4 md:p-5 bg-white border-b no-print space-y-5">
            {/* 搜尋列 */}
            <div className="w-[98%] max-w-[1400px] mx-auto relative">
               <div className="absolute left-4 top-3.5 text-gray-400"><Icons.Search /></div>
               <input 
                  type="text" placeholder="搜尋核心知識、單元或筆記關鍵字..." 
                  className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#f59e0b] outline-none transition-shadow text-lg"
                  value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
               />
            </div>

            {/* 科目與熟練度篩選列 */}
            <div className="flex flex-col sm:flex-row gap-4 w-[98%] max-w-[1400px] mx-auto justify-between items-start sm:items-center">
                <div className="flex gap-3 overflow-x-auto whitespace-nowrap w-full sm:w-auto scrollbar-hide pb-2">
                  {subjects.map(sub => (
                    <button key={sub} onClick={() => handleSubjectChange(sub)}
                      className={`px-5 py-2.5 rounded-full text-base font-bold transition-colors flex-shrink-0 ${filterSubject === sub ? 'bg-[#f59e0b] text-[#ffffff]' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                      {sub}
                    </button>
                  ))}
                </div>
                
                <div className="flex gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100 w-full sm:w-auto overflow-x-auto">
                    <button onClick={() => setFilterMastery('All')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap ${filterMastery === 'All' ? 'bg-white shadow-md text-gray-800' : 'text-gray-500'}`}>全部熟練度</button>
                    <button onClick={() => setFilterMastery('need_review')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap flex items-center gap-1.5 ${filterMastery === 'need_review' ? 'bg-white shadow-md text-red-600' : 'text-gray-500'}`}>🔴 需複習</button>
                    <button onClick={() => setFilterMastery('mastered')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap flex items-center gap-1.5 ${filterMastery === 'mastered' ? 'bg-white shadow-md text-green-600' : 'text-gray-500'}`}>🟢 已掌握</button>
                </div>
            </div>
            
            {/* 次標題篩選 */}
            {filterSubject !== 'All' && availableSubSubjects.length > 1 && (
              <div className="flex gap-3 w-[98%] max-w-[1400px] mx-auto pt-4 border-t border-gray-100 border-dashed overflow-x-auto scrollbar-hide pb-2">
                {availableSubSubjects.map(subSub => (
                  <button key={subSub} onClick={() => setFilterSubSubject(subSub)}
                    className={`px-4 py-2 rounded-full text-sm font-bold transition-colors flex-shrink-0 ${filterSubSubject === subSub ? 'bg-[#b45309] text-white shadow-md' : 'bg-gray-50 text-gray-600 hover:bg-gray-200 border border-gray-200'}`}>
                    {subSub === 'All' ? '全部單元' : subSub}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div id="print-area" className="p-4 md:p-5 print:p-0 w-[98%] max-w-[1400px] mx-auto space-y-8 print:space-y-0 bg-[#fffbeb] print:bg-white">
            
            <div className="hidden print:block text-center mb-8 print-header border-b-2 border-black pb-4">
              <h1 className="text-4xl font-bold text-black">
                {currentProfile} 的 {filterSubject === 'All' ? '綜合' : filterSubject} 
                {filterSubSubject !== 'All' && ` - ${filterSubSubject}`} 錯題本
              </h1>
              <p className="text-gray-500 mt-2 text-lg">列印日期：{new Date().toLocaleDateString()}</p>
            </div>

            {filteredData.length === 0 ? (
               <div className="text-center py-24 text-gray-400 no-print">
                  <div className="flex justify-center mb-5 scale-150"><Icons.Cloud /></div>
                  <p className="mt-5 text-2xl font-bold">找不到符合條件的錯題</p>
               </div>
            ) : (
              filteredData.map((item, index) => (
                <div key={item.id} className="bg-white p-7 print-card rounded-2xl shadow-sm border border-gray-200 print:shadow-none print:border-black break-inside-avoid print:bg-white">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5 print:mb-3">
                    <div className="flex flex-wrap gap-3 items-center w-full">
                      <span className="bg-amber-50 print:bg-transparent print:border print:border-black text-[#b45309] print:text-black px-4 py-1.5 rounded-full text-base font-bold border border-amber-200">
                        #{index + 1} {item.subject}
                      </span>
                      {item.sub_subject && (
                         <span className="bg-gray-100 print:bg-transparent print:border print:border-black text-gray-700 print:text-black px-4 py-1.5 rounded-full text-base font-semibold">{item.sub_subject}</span>
                      )}
                      <span className="bg-gray-100 print:bg-transparent print:border print:border-black text-gray-800 print:text-black px-4 py-1.5 rounded-full text-base font-bold">🎯 {item.concept}</span>
                      
                      {/* 顯示並在網頁端提供點擊切換熟練度 */}
                      <button 
                        onClick={() => handleUpdateMastery(item.id, item.mastery)}
                        className={`no-print sm:ml-auto px-4 py-1.5 rounded-full text-base font-bold transition-colors border shadow-sm flex items-center gap-2 ${(!item.mastery || item.mastery === 'need_review') ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-green-50 text-green-600 border-green-200 hover:bg-green-100'}`}
                        title="點擊切換熟練度"
                      >
                         {(!item.mastery || item.mastery === 'need_review') ? '🔴 需複習' : '🟢 已掌握'}
                      </button>
                      
                      {/* 列印時僅顯示靜態 Emoji */}
                      <span className="hidden print:inline-block ml-2 text-2xl">
                         {(!item.mastery || item.mastery === 'need_review') ? '🔴' : '🟢'}
                      </span>
                    </div>
                    <button onClick={() => handleDelete(item.id)} className="text-gray-400 hover:text-red-500 p-2 no-print transition-colors self-end sm:self-auto"><Icons.Trash /></button>
                  </div>
                  
                  <div className="mb-5 print:mb-4 bg-white print:bg-white">
                     <img src={item.image} alt="Question" className="max-w-full h-auto border border-gray-200 rounded-xl print:border-none print-img mx-auto block bg-white" />
                  </div>

                  {(item.answer || item.notes) && (
                    <div className="bg-amber-50 print:bg-white p-5 print:p-3 print:pl-4 rounded-2xl border border-amber-200 print:border-l-4 print:border-t-0 print:border-r-0 print:border-b-0 print:border-gray-800">
                      {item.answer && (
                        <div className="mb-4 print:mb-3">
                          <span className="font-bold text-gray-800 print:text-black text-xl">解答：</span>
                          <span className="text-gray-800 print:text-black text-xl whitespace-pre-wrap leading-relaxed">{item.answer}</span>
                        </div>
                      )}
                      {item.notes && (
                        <div>
                          <span className="font-bold text-[#b45309] print:text-black text-xl">筆記：</span>
                          <p className="text-gray-700 print:text-black text-xl whitespace-pre-wrap mt-2 leading-relaxed">{item.notes}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))
            )}
            
            <div className="no-print text-center py-8 text-base text-gray-400 font-bold">
              💡 若點擊「輸出 PDF」無反應或被阻擋，請使用瀏覽器右上角的「分享」>「列印」功能。
            </div>
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
