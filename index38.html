      text-size-adjust: 100%;

    /* 列印專用樣式 - 強制純白背景 */
    @media print {
      body, html, #root, .min-h-screen, .bg-\[\#fffbeb\] { background-color: #ffffff !important; }
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; background-color: #ffffff !important; }
      .no-print { display: none !important; }
      @page { margin: 0.5cm 2cm; size: A4 portrait; }
      /* 縮小卡片間距，塞入更多錯題 */

      .print-img { max-width: 100% !important; max-height: none !important; object-fit: contain; }
      .print-header { margin-bottom: 1rem !important; padding-bottom: 0.5rem !important; }
    }
    
    /* 避免觸控裝置上的橡皮筋效果與選取 */

    // --- LaTeX 數學/化學式渲染組件 ---
    function LatexText({ content, className }) {
      const containerRef = useRef(null);
      useEffect(() => {
        if (containerRef.current && window.renderMathInElement) {
          // 確保每次重新渲染時，先還原為純文字，避免 KaTeX 修改的 DOM 與 React 產生衝突
          containerRef.current.innerText = content || '';
          window.renderMathInElement(containerRef.current, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false,
            output: 'html'
          });
        }
      }, [content]);
      return <div ref={containerRef} className={className}></div>;
    }

    // --- 高效能手寫板元件 (用於筆記欄位) ---
    function NoteCanvas({ initialDataUrl, onChange }) {
      const containerRef = useRef(null);
      const canvasRef = useRef(null);
      const ctxRef = useRef(null);
      const [mode, setMode] = useState('pen');
      const [color, setColor] = useState('#000000');
      const [penSize, setPenSize] = useState(6);
      const [eraserSize, setEraserSize] = useState(40);
      
      const isDrawing = useRef(false);
      const lastPosRef = useRef({x: 0, y: 0});
      const activePointers = useRef(new Map());
      const canvasRectRef = useRef(null);

      // 強制阻斷 iOS Safari 滑動干擾 (與 EditView 相同等級防呆)
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const handleTouchMove = (e) => {
           if (e.cancelable) e.preventDefault();
        };
        container.addEventListener('touchmove', handleTouchMove, { passive: false });
        return () => container.removeEventListener('touchmove', handleTouchMove);
      }, []);

      useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          ctxRef.current = ctx;
          // 固定高解析度，確保筆跡細膩
          canvas.width = 1200;
          canvas.height = 800;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          if (initialDataUrl && initialDataUrl.startsWith('data:image')) {
              const img = new Image();
              img.onload = () => {
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              };
              img.src = initialDataUrl;
          }
      }, []); // 空陣列確保只初始化一次

      const getPos = (clientX, clientY) => {
          const canvas = canvasRef.current;
          const rect = canvasRectRef.current || canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          return {
              x: (clientX - rect.left) * scaleX,
              y: (clientY - rect.top) * scaleY,
              scaleX
          };
      };

      const startDraw = (e) => {
          activePointers.current.set(e.pointerId, e);
          try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}
          
          if (activePointers.current.size >= 2) {
             isDrawing.current = false;
             return;
          }

          isDrawing.current = true;
          canvasRectRef.current = canvasRef.current.getBoundingClientRect();
          const { x, y, scaleX } = getPos(e.clientX, e.clientY);
          lastPosRef.current = { x, y };
          
          const ctx = ctxRef.current;
          const currentSize = (mode === 'eraser' ? eraserSize : penSize) * scaleX;
          ctx.beginPath();
          ctx.arc(x, y, currentSize / 2, 0, Math.PI * 2);
          ctx.fillStyle = mode === 'eraser' ? '#ffffff' : color;
          ctx.fill();
      };

      const moveDraw = (e) => {
          if (!activePointers.current.has(e.pointerId)) return;
          activePointers.current.set(e.pointerId, e);

          if (activePointers.current.size >= 2) return;
          if (!isDrawing.current) return;
          
          const pointer = e;
          const ctx = ctxRef.current;
          const { scaleX } = getPos(pointer.clientX, pointer.clientY);
          
          ctx.lineWidth = (mode === 'eraser' ? eraserSize : penSize) * scaleX;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.strokeStyle = mode === 'eraser' ? '#ffffff' : color;
          
          const eventsToProcess = (pointer.nativeEvent && typeof pointer.nativeEvent.getCoalescedEvents === 'function')
              ? pointer.nativeEvent.getCoalescedEvents()
              : [pointer.nativeEvent || pointer];

          ctx.beginPath();
          ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
          
          let lastPos = lastPosRef.current;
          for (let i = 0; i < eventsToProcess.length; i++) {
              const ev = eventsToProcess[i];
              const { x, y } = getPos(ev.clientX, ev.clientY);
              ctx.lineTo(x, y);
              lastPos = { x, y };
          }
          ctx.stroke();
          lastPosRef.current = lastPos;
      };

      const endDraw = (e) => {
          if (e && e.pointerId) {
              activePointers.current.delete(e.pointerId);
              try { e.currentTarget.releasePointerCapture(e.pointerId); } catch(err) {}
          } else {
              activePointers.current.clear();
          }

          if (activePointers.current.size === 0) {
              if (isDrawing.current) {
                  isDrawing.current = false;
                  if (ctxRef.current) ctxRef.current.beginPath();
                  onChange(canvasRef.current.toDataURL('image/jpeg', 0.8));
              }
              canvasRectRef.current = null;
          }
      };

      const handleClear = () => {
          if(window.confirm('確定要清除所有手寫筆記嗎？')) {
              const canvas = canvasRef.current;
              const ctx = ctxRef.current;
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              onChange('');
          }
      };

      return (
          <div className="border border-amber-200 rounded-xl overflow-hidden bg-white flex flex-col">
              {/* 工具列 */}
              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 p-3 bg-amber-50 border-b border-amber-200 w-full">
                  <div className="flex items-center gap-2">
                      <button onClick={() => { setMode('pen'); setColor('#000000'); }} className={`w-8 h-8 rounded-full border-2 transition-transform flex-shrink-0 ${mode === 'pen' && color === '#000000' ? 'scale-125 border-gray-400 shadow-md' : 'border-transparent'}`} style={{backgroundColor: '#000000'}} title="黑筆"></button>
                      <button onClick={() => { setMode('pen'); setColor('#ef4444'); }} className={`w-8 h-8 rounded-full border-2 transition-transform flex-shrink-0 ${mode === 'pen' && color === '#ef4444' ? 'scale-125 border-gray-400 shadow-md' : 'border-transparent'}`} style={{backgroundColor: '#ef4444'}} title="紅筆"></button>
                      <button onClick={() => { setMode('pen'); setColor('#3b82f6'); }} className={`w-8 h-8 rounded-full border-2 transition-transform flex-shrink-0 ${mode === 'pen' && color === '#3b82f6' ? 'scale-125 border-gray-400 shadow-md' : 'border-transparent'}`} style={{backgroundColor: '#3b82f6'}} title="藍筆"></button>
                      
                      <div className="w-px h-6 bg-amber-200 mx-1"></div>
                      
                      <button onClick={() => setMode('eraser')} className={`p-2 rounded-lg transition-colors flex items-center gap-1 font-bold text-sm flex-shrink-0 ${mode === 'eraser' ? 'bg-amber-600 text-white shadow-md' : 'text-gray-600 hover:bg-amber-100'}`}>
                          <Icons.Eraser /> 橡皮擦
                      </button>
                  </div>
                  
                  {/* 尺寸選擇區 */}
                  <div className="flex items-center gap-2 overflow-x-auto sm:ml-2">
                     {mode === 'pen' && (
                        <>
                          <button onClick={() => setPenSize(4)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${penSize === 4 ? 'bg-amber-200 shadow-inner' : 'hover:bg-amber-100'}`} title="細"><div className="rounded-full" style={{ width: 4, height: 4, backgroundColor: color }}></div></button>
                          <button onClick={() => setPenSize(8)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${penSize === 8 ? 'bg-amber-200 shadow-inner' : 'hover:bg-amber-100'}`} title="中"><div className="rounded-full" style={{ width: 8, height: 8, backgroundColor: color }}></div></button>
                          <button onClick={() => setPenSize(16)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${penSize === 16 ? 'bg-amber-200 shadow-inner' : 'hover:bg-amber-100'}`} title="粗"><div className="rounded-full" style={{ width: 16, height: 16, backgroundColor: color }}></div></button>
                          <button onClick={() => setPenSize(24)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${penSize === 24 ? 'bg-amber-200 shadow-inner' : 'hover:bg-amber-100'}`} title="特粗"><div className="rounded-full" style={{ width: 24, height: 24, backgroundColor: color }}></div></button>
                        </>
                     )}
                     {mode === 'eraser' && (
                        <>
                          <button onClick={() => setEraserSize(10)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${eraserSize === 10 ? 'bg-white shadow-md scale-110' : 'text-gray-500 hover:bg-amber-100'}`} title="特小"><div className="w-1.5 h-1.5 rounded-full bg-current"></div></button>
                          <button onClick={() => setEraserSize(20)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${eraserSize === 20 ? 'bg-white shadow-md scale-110' : 'text-gray-500 hover:bg-amber-100'}`} title="小"><div className="w-3 h-3 rounded-full bg-current"></div></button>
                          <button onClick={() => setEraserSize(40)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${eraserSize === 40 ? 'bg-white shadow-md scale-110' : 'text-gray-500 hover:bg-amber-100'}`} title="中"><div className="w-5 h-5 rounded-full bg-current"></div></button>
                          <button onClick={() => setEraserSize(70)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${eraserSize === 70 ? 'bg-white shadow-md scale-110' : 'text-gray-500 hover:bg-amber-100'}`} title="大"><div className="w-7 h-7 rounded-full bg-current"></div></button>
                          <button onClick={() => setEraserSize(100)} className={`w-9 h-9 flex items-center justify-center rounded-full transition-all flex-shrink-0 ${eraserSize === 100 ? 'bg-white shadow-md scale-110' : 'text-gray-500 hover:bg-amber-100'}`} title="特大"><div className="w-9 h-9 rounded-full bg-current"></div></button>
                        </>
                     )}
                  </div>
                  
                  <button onClick={handleClear} className="p-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors sm:ml-auto flex items-center gap-1 font-bold text-sm flex-shrink-0 w-full sm:w-auto justify-center mt-2 sm:mt-0">
                      <Icons.Trash /> 全部清除
                  </button>
              </div>
              {/* 繪圖區 */}
              <div ref={containerRef} className="w-full bg-gray-100 touch-none flex-grow" style={{ minHeight: '350px' }}>
                  <canvas 
                      ref={canvasRef}
                      className="w-full h-full cursor-crosshair touch-none block"
                      style={{ objectFit: 'contain' }}
                      onPointerDown={startDraw}
                      onPointerMove={moveDraw}
                      onPointerUp={endDraw}
                      onPointerCancel={endDraw}
                      onPointerOut={endDraw}
                  />
              </div>
          </div>
      );
    }

          8. 【最重要：數學與化學式排版】為了讓系統能優美地渲染公式，你在 ai_tutor 中的「所有數學式、化學式、方程式、變數符號、上標、下標」都「必須」使用 LaTeX 語法包裝！
             - 行內公式：請使用單錢字號包裝，例如：方程式 $ax^2+bx+c=0$、判別式 $\Delta = b^2-4ac$、變數 $x$。
             - 獨立成行的公式：請使用雙錢字號包裝，例如：$$x = \frac{-b \pm \sqrt{b^2-4ac}}{2a}$$
             - 絕對禁止直接輸出純文字的指數 (例如 x^2) 或未包裝的變數，請一定要寫成 $x^2$。

          JSON 格式必須嚴格如下：
          {
            "subject": "科目名稱",
            "volume": "冊別名稱(或null)",
            "sub_subject": "單元/章節名稱",
            "concept": "核心知識",
            "ai_tutor": "教學解析內容"
          }`;

          const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
          if (!modelsRes.ok) throw new Error('無法取得模型清單，請確認 API Key 是否有效。');
          
          const modelsData = await modelsRes.json();
          const availableModels = modelsData.models ? modelsData.models.map(m => m.name.replace('models/', '')) : [];

          const preferredModels = ['gemini-2.5-flash', 'gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-pro', 'gemini-1.5-pro-latest'];
          let modelsToTry = preferredModels.filter(m => availableModels.includes(m));
          
          if (modelsToTry.length === 0) {
              modelsToTry = availableModels.filter(m => m.includes('gemini') && (m.includes('flash') || m.includes('pro') || m.includes('vision')));
          }
          if (modelsToTry.length === 0) throw new Error('您的 API Key 沒有權限使用任何支援影像分析的模型。');

          let successData = null;
          let lastErrorMsg = '';

          for (const targetModel of modelsToTry) {
            if (successData) break;
            
            const maxRetries = 3; 
            let delay = 2000; 

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              setLoadingMsg(`AI 老師分析教學中...\n(模型: ${targetModel}, 嘗試: ${attempt}/${maxRetries})`);
              
              try {
                const isOldVision = targetModel.includes('vision');
                const bodyPayload = {
                  contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }]
                };
                if (!isOldVision) bodyPayload.generationConfig = { responseMimeType: "application/json" };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(bodyPayload)
                });

                if (response.ok) {
                  successData = await response.json();
                  break; 
                } else {
                  const errData = await response.json().catch(() => ({}));
                  lastErrorMsg = errData.error?.message || `模型 ${targetModel} 回傳未知錯誤`;
                  
                  if (response.status === 503 || response.status === 429 || lastErrorMsg.includes('high demand')) {
                    if (attempt < maxRetries) {
                      setLoadingMsg(`伺服器目前滿載...\n系統將在 ${delay/1000} 秒後自動重試\n請稍候...`);
                      await new Promise(res => setTimeout(res, delay));
                      delay *= 2; continue; 
                    }
                  } else break;
                }
              } catch (e) {
                 lastErrorMsg = e.message;
                 if (attempt < maxRetries) {
                    setLoadingMsg(`網路連線不穩...\n將在 ${delay/1000} 秒後自動重試`);
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                 }
              }
            } 
          } 

          if (!successData) throw new Error(`所有可用模型經過多次重試後皆因高流量或無權限而失敗。\n最後錯誤原因：${lastErrorMsg}`);

          const aiResponseText = successData.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (aiResponseText) {
            let parsed = { subject: '國文', volume: null, sub_subject: '單元1 (「相似詞語」的分辨)', concept: '未定單元', ai_tutor: '' };
            try {
               const cleanedText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
               parsed = JSON.parse(cleanedText);
            } catch (e) { console.error("JSON Parse Error:", e, aiResponseText); }
            setAiAnalysis({
              subject: parsed.subject || '國文',
              volume: parsed.volume || null,
              sub_subject: parsed.sub_subject || '',
              concept: parsed.concept || '未定知識點',
              ai_tutor: parsed.ai_tutor || ''
            });
          }
        } catch (error) {
          console.error(error);
          alert('AI 分析失敗：\n' + error.message + '\n\n您可以先手動輸入分類。');
          setAiAnalysis({ subject: '國文', volume: null, sub_subject: '', concept: '', ai_tutor: '' });
        }
        
        setLoadingMsg('');
        setCurrentView('form');
      };

    // --- 透視校正與影像處理 ---

    // 解 8x8 線性方程組 (用於計算透視變換矩陣)
    function solveMatrix(A, b) {
      const n = 8;
      for (let i = 0; i < n; i++) {
        let max = i;
        for (let j = i + 1; j < n; j++) if (Math.abs(A[j][i]) > Math.abs(A[max][i])) max = j;
        [A[i], A[max]] = [A[max], A[i]];
        [b[i], b[max]] = [b[max], b[i]];
        for (let j = i + 1; j < n; j++) {
          const factor = A[j][i] / A[i][i];
          b[j] -= factor * b[i];
          for (let k = i; k < n; k++) A[j][k] -= factor * A[i][k];
        }
      }
      const x = new Array(n).fill(0);
      for (let i = n - 1; i >= 0; i--) {
        let sum = b[i];
        for (let j = i + 1; j < n; j++) sum -= A[i][j] * x[j];
        x[i] = sum / A[i][i];
      }
      return x;
    }

    // 計算 Homography Matrix
    function getHomography(src, dst) {
      const A = [], B = [];
      for (let i = 0; i < 4; i++) {
        const u = dst[i].x, v = dst[i].y, x = src[i].x, y = src[i].y;
        A.push([u, v, 1, 0, 0, 0, -x * u, -x * v]); B.push(x);
        A.push([0, 0, 0, u, v, 1, -y * u, -y * v]); B.push(y);
      }
      return solveMatrix(A, B);
    }

    function CropView({ imageUrl, onCancel, onComplete, onUpdateRawImage }) {
      const containerRef = useRef(null);
      const imgRef = useRef(null);
      
      // 4 points for perspective crop: TL, TR, BR, BL
      const [pts, setPts] = useState([
        { x: 10, y: 10 }, { x: 90, y: 10 }, 
        { x: 90, y: 90 }, { x: 10, y: 90 }
      ]);
      const [draggingIdx, setDraggingIdx] = useState(null);

      const startDrag = (e, idx) => {
        e.preventDefault();
        setDraggingIdx(idx);
      };

      const onDrag = useCallback((e) => {
        if (draggingIdx === null || !containerRef.current) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = containerRef.current.getBoundingClientRect();
        
        let nx = ((clientX - rect.left) / rect.width) * 100;
        let ny = ((clientY - rect.top) / rect.height) * 100;
        nx = Math.max(0, Math.min(100, nx));
        ny = Math.max(0, Math.min(100, ny));

        setPts(prev => {
          const next = [...prev];
          next[draggingIdx] = { x: nx, y: ny };
          
          if (draggingIdx === 0) { 
            next[1] = { ...next[1], y: ny }; 
            next[3] = { ...next[3], x: nx }; 
          } else if (draggingIdx === 1) { 
            next[0] = { ...next[0], y: ny }; 
            next[2] = { ...next[2], x: nx }; 
          } else if (draggingIdx === 2) { 
            next[3] = { ...next[3], y: ny }; 
            next[1] = { ...next[1], x: nx }; 
          } else if (draggingIdx === 3) { 
            next[2] = { ...next[2], y: ny }; 
            next[0] = { ...next[0], x: nx }; 
          }
          return next;
        });
      }, [draggingIdx]);

      const endDrag = () => setDraggingIdx(null);

      useEffect(() => {
        if (draggingIdx !== null) {
          window.addEventListener('mousemove', onDrag);
          window.addEventListener('mouseup', endDrag);
          window.addEventListener('touchmove', onDrag, { passive: false });
          window.addEventListener('touchend', endDrag);
        }
        return () => {
          window.removeEventListener('mousemove', onDrag);
          window.removeEventListener('mouseup', endDrag);
          window.removeEventListener('touchmove', onDrag);
          window.removeEventListener('touchmove', endDrag);
        };
      }, [draggingIdx, onDrag]);

      // 旋轉 90 度功能
      const handleRotate = () => {
        const img = new Image();
        img.onload = () => {
          const cvs = document.createElement('canvas');
          cvs.width = img.height;
          cvs.height = img.width;
          const ctx = cvs.getContext('2d');
          ctx.translate(cvs.width / 2, cvs.height / 2);
          ctx.rotate(90 * Math.PI / 180);
          ctx.drawImage(img, -img.width / 2, -img.height / 2);
          onUpdateRawImage(cvs.toDataURL('image/jpeg', 1.0));
          // Reset points
          setPts([{ x: 10, y: 10 }, { x: 90, y: 10 }, { x: 90, y: 90 }, { x: 10, y: 90 }]);
        };
        img.src = imageUrl;
      };

      // 執行四點透視校正
      const handleConfirm = () => {
        const img = imgRef.current;
        const srcW = img.naturalWidth;
        const srcH = img.naturalHeight;

        // Convert percentage to actual pixels
        const srcPts = pts.map(p => ({ x: (p.x / 100) * srcW, y: (p.y / 100) * srcH }));

        // Calculate output dimensions
        const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        const outW = Math.round(Math.max(dist(srcPts[0], srcPts[1]), dist(srcPts[3], srcPts[2])));
        const outH = Math.round(Math.max(dist(srcPts[0], srcPts[3]), dist(srcPts[1], srcPts[2])));
        
        const dstPts = [{x:0, y:0}, {x:outW, y:0}, {x:outW, y:outH}, {x:0, y:outH}];
        const H_matrix = getHomography(srcPts, dstPts);

        // Draw original to hidden canvas to get pixel data
        const srcCvs = document.createElement('canvas');
        srcCvs.width = srcW; srcCvs.height = srcH;
        const srcCtx = srcCvs.getContext('2d');
        srcCtx.drawImage(img, 0, 0);
        const srcData = srcCtx.getImageData(0, 0, srcW, srcH).data;

        // Create destination canvas
        const dstCvs = document.createElement('canvas');
        dstCvs.width = outW; dstCvs.height = outH;
        const dstCtx = dstCvs.getContext('2d');
        const dstImgData = dstCtx.createImageData(outW, outH);
        const dstData = dstImgData.data;

        // Inverse mapping with Nearest Neighbor interpolation
        for (let y = 0; y < outH; y++) {
          for (let x = 0; x < outW; x++) {
            const z = H_matrix[6] * x + H_matrix[7] * y + 1;
            const sx = Math.round((H_matrix[0] * x + H_matrix[1] * y + H_matrix[2]) / z);
            const sy = Math.round((H_matrix[3] * x + H_matrix[4] * y + H_matrix[5]) / z);

            const dstIdx = (y * outW + x) * 4;
            if (sx >= 0 && sx < srcW && sy >= 0 && sy < srcH) {
              const srcIdx = (sy * srcW + sx) * 4;
              dstData[dstIdx] = srcData[srcIdx];
              dstData[dstIdx+1] = srcData[srcIdx+1];
              dstData[dstIdx+2] = srcData[srcIdx+2];
              dstData[dstIdx+3] = srcData[srcIdx+3];
            } else {
              dstData[dstIdx+3] = 0; // Transparent
            }
          }
        }
        dstCtx.putImageData(dstImgData, 0, 0);
        onComplete(dstCvs.toDataURL('image/jpeg', 0.9));
      };

      // 產生 SVG 多邊形字串 (將百分比轉為 viewBox 的絕對數值)
      const polygonPoints = pts.map(p => `${p.x},${p.y}`).join(' ');

      return (
        <div className="fixed inset-0 bg-gray-900 flex flex-col z-50">
          <div className="flex justify-between items-center p-5 text-white bg-gray-800 shadow-md z-20">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="text-lg font-bold">✂️ 第一步：透視校正裁切</span>
            <button onClick={handleRotate} className="p-2 px-4 bg-gray-700 rounded-lg hover:bg-gray-600 transition-colors flex items-center gap-2 text-base font-bold"><Icons.Rotate /> 旋轉</button>
          </div>
          
          <div className="flex-grow relative overflow-hidden flex items-center justify-center p-4">
            <div ref={containerRef} className="relative inline-block touch-none" style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)' }}>
                <img 
                  ref={imgRef} src={imageUrl} alt="To crop" className="block pointer-events-none" 
                  style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)', width: 'auto', height: 'auto' }}
                />
                
                {/* SVG Mask overlay with viewBox to support absolute coordinates mapping */}
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                  <defs>
                    <mask id="crop-mask">
                      <rect width="100" height="100" fill="white" />
                      <polygon points={polygonPoints} fill="black" />
                    </mask>
                  </defs>
                  <rect width="100" height="100" fill="rgba(0,0,0,0.6)" mask="url(#crop-mask)" />
                  <polygon points={polygonPoints} fill="none" stroke="#f59e0b" strokeWidth="3" strokeDasharray="1,1" vectorEffect="non-scaling-stroke" />
                </svg>

                {/* Draggable corners */}
                <div className="absolute inset-0 z-20 pointer-events-none">
                  {pts.map((pt, i) => (
                     <div key={i} className="absolute w-10 h-10 bg-white border-4 border-[#f59e0b] rounded-full shadow-lg pointer-events-auto cursor-move transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center"
                          style={{ top: `${pt.y}%`, left: `${pt.x}%` }}
                          onMouseDown={(e) => startDrag(e, i)} onTouchStart={(e) => startDrag(e, i)}>
                          <div className="w-2 h-2 bg-[#f59e0b] rounded-full"></div>
                     </div>
                  ))}
                </div>
            </div>
          </div>

          <div className="p-6 bg-white rounded-t-3xl flex gap-5 justify-between items-center shadow-lg z-20">
             <button onClick={onCancel} className="px-6 py-4 bg-gray-100 text-gray-700 rounded-xl font-bold text-lg flex-1">🖼️ 重新選圖</button>
             <button onClick={handleConfirm} className="px-6 py-4 bg-[#f59e0b] text-[#ffffff] rounded-xl font-bold text-lg flex-1 flex justify-center items-center gap-2 hover:bg-[#d97706] transition-colors">下一步 ➡️</button>
          </div>
        </div>
      );
    }

    function EditView({ imageUrl, onCancel, onComplete }) {
      const containerRef = useRef(null);
      const canvasRef = useRef(null);
      const cursorRef = useRef(null);
      const ctxRef = useRef(null); 
      const isDrawingRef = useRef(false);
      const lastPosRef = useRef({ x: 0, y: 0 });
      
      const activePointers = useRef(new Map());
      const canvasRectRef = useRef(null);

      const [mode, setMode] = useState('none');
      const historyRef = useRef([]); 
      const [canUndo, setCanUndo] = useState(false);
      
      const [eraserSize, setEraserSize] = useState(40);
      const [penSize, setPenSize] = useState(6);
      const [penColor, setPenColor] = useState('#ef4444');
      
      const [showSizePicker, setShowSizePicker] = useState(false);
      const [showPenPicker, setShowPenPicker] = useState(false);
      const [isInteracting, setIsInteracting] = useState(false); // ★ 動態隱藏黑框 ★
      
      const [canvasDim, setCanvasDim] = useState({ w: 0, h: 0 });
      const [exportScale, setExportScale] = useState(1);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [rotation, setRotation] = useState(0); 
      const [isPanning, setIsPanning] = useState(false);
      const touchRef = useRef({ dist: 0, angle: 0 }); 
      const panRef = useRef({ startX: 0, startY: 0, startPanX: 0, startPanY: 0 });

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctxRef.current = ctx; 
        const img = new Image();
        img.onload = () => {
          const maxWidth = 2500; // 從 1500 提升基礎極限解析度
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
          canvas.width = w; canvas.height = h;
          setCanvasDim({ w, h });
          ctx.drawImage(img, 0, 0, w, h);
          historyRef.current = [];
          setCanUndo(false);

          if (containerRef.current) {
             const rect = containerRef.current.getBoundingClientRect();
             const initScale = Math.min((rect.width - 40) / w, (rect.height - 100) / h, 1);
             setExportScale(initScale);
          }
        };
        img.src = imageUrl;
      }, [imageUrl]);

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const handleTouchMove = (e) => {
           if (mode !== 'none' && e.cancelable) {
              e.preventDefault();
           }
        };
        container.addEventListener('touchmove', handleTouchMove, { passive: false });
        return () => container.removeEventListener('touchmove', handleTouchMove);
      }, [mode]);

      const saveState = () => {
        const cvs = canvasRef.current;
        historyRef.current.push(ctxRef.current.getImageData(0, 0, cvs.width, cvs.height));
        if (historyRef.current.length > 10) historyRef.current.shift(); 
        setCanUndo(prev => prev ? true : true); 
      };

      const handleUndo = () => {
        if (historyRef.current.length === 0) return;
        const lastState = historyRef.current.pop();
        ctxRef.current.putImageData(lastState, 0, 0);
        setCanUndo(historyRef.current.length > 0);
      };

      const toggleCursor = (visible) => {
          if (!cursorRef.current) return;
          if (visible && (mode === 'eraser' || mode === 'pen')) {
              cursorRef.current.style.opacity = mode === 'pen' ? '0.8' : '1';
          } else {
              cursorRef.current.style.opacity = '0';
          }
      };

      const updateCursorPos = (clientX, clientY) => {
        if ((mode !== 'eraser' && mode !== 'pen') || !cursorRef.current) return;
        cursorRef.current.style.transform = `translate3d(calc(${clientX}px - 50%), calc(${clientY}px - 50%), 0)`;
      };

      // 取得畫布精確座標 (加上包含旋轉與平移的精準快取運算)
      const getCanvasPos = (clientX, clientY) => {
        const canvas = canvasRef.current;
        const rect = canvasRectRef.current || canvas.getBoundingClientRect();
        
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        
        const rad = -rotation * (Math.PI / 180);
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        
        const x = rx / exportScale + canvas.width / 2;
        const y = ry / exportScale + canvas.height / 2;
        
        return { x, y, scaleX: 1 / exportScale };
      };

      const startAction = (e) => {
        activePointers.current.set(e.pointerId, e);
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}

        setIsInteracting(true); // ★ 觸控開始，隱藏教學黑框 ★

        // --- 處理雙指縮放與旋轉 ---
        if (activePointers.current.size >= 2) {
            if (isDrawingRef.current) return; 
            const pts = Array.from(activePointers.current.values());
            const dx = pts[1].clientX - pts[0].clientX;
            const dy = pts[1].clientY - pts[0].clientY;
            touchRef.current.dist = Math.hypot(dx, dy);
            touchRef.current.angle = Math.atan2(dy, dx) * (180 / Math.PI); 
            return;
        }

        // --- 單點處理 ---
        const pointer = e;

        if (mode === 'scale' || mode === 'rotate') {
            setIsPanning(true);
            panRef.current = { startX: pointer.clientX, startY: pointer.clientY, startPanX: pan.x, startPanY: pan.y };
        } else if (mode === 'eraser' || mode === 'pen') {
            updateCursorPos(pointer.clientX, pointer.clientY);
            toggleCursor(true);
            saveState();
            isDrawingRef.current = true;
            
            canvasRectRef.current = canvasRef.current.getBoundingClientRect();
            const { x, y, scaleX } = getCanvasPos(pointer.clientX, pointer.clientY);
            lastPosRef.current = { x, y };

            const ctx = ctxRef.current;
            const currentSize = (mode === 'eraser' ? eraserSize : penSize) * scaleX;
            ctx.fillStyle = mode === 'eraser' ? '#ffffff' : penColor;
            
            ctx.beginPath();
            ctx.arc(x, y, currentSize / 2, 0, Math.PI * 2);
            ctx.fill();
        }
      };

      const moveAction = (e) => {
        if (!activePointers.current.has(e.pointerId)) return;
        activePointers.current.set(e.pointerId, e);

        // --- 處理雙指獨立的縮放與旋轉 ---
        if (activePointers.current.size >= 2) {
            if (isDrawingRef.current) return;
            const pts = Array.from(activePointers.current.values());
            const dx = pts[1].clientX - pts[0].clientX;
            const dy = pts[1].clientY - pts[0].clientY;
            const dist = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx) * (180 / Math.PI); 

            if (mode === 'scale') {
                if (touchRef.current.dist > 0) {
                    const deltaScale = dist / touchRef.current.dist;
                    setExportScale(prev => Math.min(Math.max(prev * deltaScale, 0.2), 5));
                }
            } else if (mode === 'rotate') {
                if (touchRef.current.angle !== undefined) {
                    let deltaAngle = angle - touchRef.current.angle;
                    if (deltaAngle > 180) deltaAngle -= 360;
                    if (deltaAngle < -180) deltaAngle += 360;
                    setRotation(prev => prev + deltaAngle);
                }
            }

            touchRef.current.dist = dist;
            touchRef.current.angle = angle;
            return;
        }

        // --- 單點處理 ---
        const pointer = e;

        if ((mode === 'scale' || mode === 'rotate') && isPanning) {
            const dx = pointer.clientX - panRef.current.startX;
            const dy = pointer.clientY - panRef.current.startY;
            setPan({ x: panRef.current.startPanX + dx, y: panRef.current.startPanY + dy });
        } else if ((mode === 'eraser' || mode === 'pen') && isDrawingRef.current) {
            updateCursorPos(pointer.clientX, pointer.clientY);
            
            const ctx = ctxRef.current;
            const { scaleX } = getCanvasPos(pointer.clientX, pointer.clientY);
            
            ctx.lineWidth = (mode === 'eraser' ? eraserSize : penSize) * scaleX;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = mode === 'eraser' ? '#ffffff' : penColor;
            
            const eventsToProcess = (pointer.nativeEvent && typeof pointer.nativeEvent.getCoalescedEvents === 'function')
                ? pointer.nativeEvent.getCoalescedEvents()
                : [pointer.nativeEvent || pointer];

            ctx.beginPath();
            ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
            
            let lastPos = lastPosRef.current;
            for (let i = 0; i < eventsToProcess.length; i++) {
                const ev = eventsToProcess[i];
                const { x, y } = getCanvasPos(ev.clientX, ev.clientY);
                ctx.lineTo(x, y);
                lastPos = { x, y };
            }
            ctx.stroke();

            lastPosRef.current = lastPos;
        }
      };

      const endAction = (e) => {
        if (e && e.pointerId) {
            activePointers.current.delete(e.pointerId);
            try { e.currentTarget.releasePointerCapture(e.pointerId); } catch(err) {}
        } else {
            activePointers.current.clear();
        }

        if (activePointers.current.size === 0) {
            setIsInteracting(false); // ★ 所有觸控結束，恢復顯示黑框 ★
            if (isPanning) setIsPanning(false);
            if (isDrawingRef.current) {
                isDrawingRef.current = false;
                if (ctxRef.current) ctxRef.current.beginPath();
            }
            touchRef.current.dist = 0;
            canvasRectRef.current = null; 
        }
      };

      const handleWheel = (e) => {
        if (mode === 'scale') {
           e.preventDefault();
           const delta = e.deltaY > 0 ? 0.95 : 1.05;
           setExportScale(prev => Math.min(Math.max(prev * delta, 0.2), 5));
        } else if (mode === 'rotate') {
           e.preventDefault();
           const deltaAngle = e.deltaY > 0 ? -2 : 2; 
           setRotation(prev => prev + deltaAngle);
        }
      };

      // ★ 匯出時包含使用者調整好的旋轉角度與縮放大小 ★
      const handleComplete = () => {
        const canvas = canvasRef.current;
        const finalCanvas = document.createElement('canvas');
        
        const rad = rotation * Math.PI / 180;
        const absCos = Math.abs(Math.cos(rad));
        const absSin = Math.abs(Math.sin(rad));
        
        // 基礎顯示的實體寬高 (依照使用者在畫面上校正的大小)
        const baseW = canvas.width * exportScale;
        const baseH = canvas.height * exportScale;
        
        // ★ 核心優化：提升解析度乘數，大約等同於 300 DPI，解決列印失真模糊問題
        const RESOLUTION_MULTIPLIER = 3;
        const w = baseW * RESOLUTION_MULTIPLIER;
        const h = baseH * RESOLUTION_MULTIPLIER;
        
        const finalW = w * absCos + h * absSin;
        const finalH = w * absSin + h * absCos;
        
        finalCanvas.width = finalW;
        finalCanvas.height = finalH;
        
        const ctx = finalCanvas.getContext('2d');
        
        // ★ 填滿白底，防止旋轉後出現黑邊
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, finalW, finalH);

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        ctx.translate(finalW / 2, finalH / 2);
        ctx.rotate(rad);
        ctx.drawImage(canvas, -w / 2, -h / 2, w, h);
        
        // 傳回高畫質圖片，同時將原本的實體顯示寬度傳回，讓外部 CSS 知道該壓縮到多大
        const baseBoundingW = baseW * absCos + baseH * absSin;
        onComplete(finalCanvas.toDataURL('image/jpeg', 0.92), baseBoundingW);
      };

      const handleRemoveColoredPen = () => {
        setShowSizePicker(false);
        setShowPenPicker(false);
        setMode('none');
        saveState();
        const canvas = canvasRef.current, ctx = ctxRef.current || canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          const diff = max - min;
          const isYellowishPaper = r > 160 && g > 150 && b < r - 20;
          if (diff > 30 && !isYellowishPaper) {
            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      const handleRemovePencil = () => {
        setShowSizePicker(false);
        setShowPenPicker(false);
        setMode('none');
        saveState();
        const canvas = canvasRef.current, ctx = ctxRef.current || canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const lum = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
          if (lum > 110) { 
            data[i] = 255; data[i+1] = 255; data[i+2] = 255; 
          } else if (lum < 70) {
            data[i] = 0; data[i+1] = 0; data[i+2] = 0; 
          } else {
            const val = (lum - 70) * (255 / 40);
            data[i] = val; data[i+1] = val; data[i+2] = val;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      const handleRemoveBackground = () => {
        setShowSizePicker(false);
        setShowPenPicker(false);
        setMode('none');
        saveState();
        const canvas = canvasRef.current, ctx = ctxRef.current || canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), data = imgData.data;
        const threshold = 170; 
        for (let i = 0; i < data.length; i += 4) {
          const luminance = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
          if (luminance > threshold) {
            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
          } else {
            data[i] = Math.max(0, data[i] - 40); data[i+1] = Math.max(0, data[i+1] - 40); data[i+2] = Math.max(0, data[i+2] - 40);
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      return (
        <div className="fixed inset-0 bg-gray-100 flex flex-col z-50">
           {/* 高效渲染的游標元件 */}
           <div 
             ref={cursorRef}
             className="fixed z-50 pointer-events-none rounded-full"
             style={{
               display: (mode === 'eraser' || mode === 'pen') ? 'block' : 'none',
               left: 0, top: 0, // 修改為 0，靠 transform 位移
               width: mode === 'eraser' ? eraserSize : penSize, 
               height: mode === 'eraser' ? eraserSize : penSize,
               transform: 'translate3d(-1000px, -1000px, 0)', // 初始隱藏
               boxShadow: mode === 'eraser' ? '0 0 0 2px black, inset 0 0 0 2px white' : '0 0 0 1px white, inset 0 0 0 1px black',
               backgroundColor: mode === 'eraser' ? 'rgba(255,255,255,0.3)' : penColor,
               opacity: 0, // 初始隱藏，由 DOM 直接控制
               willChange: 'transform, opacity' // 開啟 GPU 加速，讓游標跟隨零延遲
             }}
           />

    function ListView({ currentProfile, onBack, FB, user, isDbConnected, onFullEdit }) {
      const [mistakes, setMistakes] = useState([]);
      const [filterSubject, setFilterSubject] = useState('All');
      const [filterVolume, setFilterVolume] = useState('All');
      const [filterSubSubject, setFilterSubSubject] = useState('All');
      const [filterMastery, setFilterMastery] = useState('All'); 
      const [searchQuery, setSearchQuery] = useState(''); 
      const [isFetching, setIsFetching] = useState(true);
      
      // 控制閱覽列表中的 AI 教學與筆記摺疊狀態 (預設隱藏，使用 expandedSections 記錄已展開的項目)
      const [expandedSections, setExpandedSections] = useState({});
      
      useEffect(() => {
        if (!user || !FB || !currentProfile) return;
        setIsFetching(true);
        const colRef = FB.collection(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`);
        const unsubscribe = FB.onSnapshot(colRef, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 改為依照建立時間（舊到新）排序，確保最先建立的題目排在最上面
            data.sort((a, b) => (a.timestamp || a.updated_at) - (b.timestamp || b.updated_at));
            setMistakes(data);
            setIsFetching(false);
        }, (error) => {
            console.error("雲端讀取錯誤:", error);
            setIsFetching(false);
        });
        return () => unsubscribe();
      }, [user, FB, currentProfile]);

      const handleDelete = async (id) => {
        if (!user || !FB || !currentProfile) return;
        if(window.confirm('確定要從雲端刪除這題嗎？(刪除後無法復原)')) {
          try { await FB.deleteDoc(FB.doc(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`, id)); } 
          catch(e) { alert('刪除失敗'); }
        }
      };

      // 在列表切換熟練度狀態
      const handleUpdateMastery = async (id, currentMastery) => {
        if (!user || !FB || !currentProfile) return;
        const newMastery = (!currentMastery || currentMastery === 'need_review') ? 'mastered' : 'need_review';
        try {
          await FB.updateDoc(FB.doc(FB.db, 'artifacts', FB.appId, 'public', 'data', `mistakes_${currentProfile}`, id), {
            mastery: newMastery
          });
        } catch (e) {
          console.error(e);
          alert('狀態更新失敗');
        }
      };

      const toggleSection = (id, type) => {
          setExpandedSections(prev => ({...prev, [`${id}_${type}`]: !prev[`${id}_${type}`]}));
      };

      const handleSubjectChange = (sub) => { setFilterSubject(sub); setFilterVolume('All'); setFilterSubSubject('All'); };
      const handleVolumeChange = (vol) => { setFilterVolume(vol); setFilterSubSubject('All'); };

      let filteredData = mistakes;
      if (filterSubject !== 'All') filteredData = filteredData.filter(m => m.subject === filterSubject);
      if (filterVolume !== 'All') filteredData = filteredData.filter(m => m.volume === filterVolume);
      if (filterSubSubject !== 'All') filteredData = filteredData.filter(m => m.sub_subject === filterSubSubject);
      if (filterMastery !== 'All') filteredData = filteredData.filter(m => (m.mastery || 'need_review') === filterMastery);
      if (searchQuery.trim()) {
         const q = searchQuery.toLowerCase().trim();
         filteredData = filteredData.filter(m => 
            (m.concept && m.concept.toLowerCase().includes(q)) || 
            (m.ai_tutor && m.ai_tutor.toLowerCase().includes(q)) ||
            (m.sub_subject && m.sub_subject.toLowerCase().includes(q)) ||
            (m.subject && m.subject.toLowerCase().includes(q)) ||
            (m.volume && m.volume.toLowerCase().includes(q))
         );
      }

      // 產生依序排列的選項
      const subjects = ['All', ...SUBJECT_ORDER];
      let availableVolumes = [];
      let availableSubSubjects = [];
      
      if (filterSubject !== 'All') {
         const info = CURRICULUM_DB[filterSubject];
         if (info && info.hasVolume) {
             availableVolumes = ['All', ...Object.keys(info.volumes)];
             if (filterVolume === 'All') {
                 Object.values(info.volumes).forEach(arr => availableSubSubjects.push(...arr));
             } else {
                 availableSubSubjects = info.volumes[filterVolume] || [];
             }
             availableSubSubjects = ['All', ...availableSubSubjects];
         } else if (info) {
             availableSubSubjects = ['All', ...info.chapters];
         }
      }

      const handlePrint = () => { setTimeout(() => { window.print(); }, 100); };

      if (isFetching) return <LoadingView message={`正在從雲端載入 ${currentProfile} 的錯題本...`} />;

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-[#f59e0b] text-[#ffffff] p-5 sticky top-0 z-10 shadow-md flex justify-between items-center no-print">
            <button onClick={onBack} className="p-2 hover:bg-[#d97706] rounded-full transition-colors"><Icons.ArrowLeft /></button>
            <div className="flex items-center gap-2">
               <h1 className="font-bold text-xl sm:text-2xl truncate max-w-[200px] sm:max-w-xs">📚 {currentProfile} 的雲端錯題本</h1>
               <div title="雲端連線狀態" className="ml-1"><Icons.StatusDot color={isDbConnected ? "#4ade80" : "#ef4444"} /></div>
            </div>
            <button onClick={handlePrint} className="bg-white text-[#451a03] px-4 py-2.5 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-50 transition-colors shadow-sm text-base">
              <Icons.Printer /> <span className="hidden sm:inline">🖨️ 輸出 PDF</span>
            </button>
          </div>

          <div className="p-4 md:p-5 bg-white border-b no-print space-y-5">
            {/* 搜尋列 */}
            <div className="w-[98%] max-w-[1400px] mx-auto relative">
               <div className="absolute left-4 top-3.5 text-gray-400"><Icons.Search /></div>
               <input 
                  type="text" placeholder="搜尋核心知識、單元或筆記關鍵字..." 
                  className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#f59e0b] outline-none transition-shadow text-lg"
                  value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
               />
            </div>

            {/* 科目與熟練度篩選列 */}
            <div className="flex flex-col sm:flex-row gap-4 w-[98%] max-w-[1400px] mx-auto justify-between items-start sm:items-center">
                <div className="flex gap-3 overflow-x-auto whitespace-nowrap w-full sm:w-auto scrollbar-hide pb-2">
                  {subjects.map(sub => (
                    <button key={sub} onClick={() => handleSubjectChange(sub)}
                      className={`px-5 py-2.5 rounded-full text-base font-bold transition-colors flex-shrink-0 ${filterSubject === sub ? 'bg-[#f59e0b] text-[#ffffff]' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                      {sub === 'All' ? '綜合' : sub}
                    </button>
                  ))}
                </div>
                
                <div className="flex gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100 w-full sm:w-auto overflow-x-auto">
                    <button onClick={() => setFilterMastery('All')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap ${filterMastery === 'All' ? 'bg-white shadow-md text-gray-800' : 'text-gray-500'}`}>全部熟練度</button>
                    <button onClick={() => setFilterMastery('need_review')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap flex items-center gap-1.5 ${filterMastery === 'need_review' ? 'bg-white shadow-md text-red-600' : 'text-gray-500'}`}>🔴 需複習</button>
                    <button onClick={() => setFilterMastery('mastered')} className={`px-4 py-2 text-sm font-bold rounded-lg whitespace-nowrap flex items-center gap-1.5 ${filterMastery === 'mastered' ? 'bg-white shadow-md text-green-600' : 'text-gray-500'}`}>🟢 已掌握</button>
                </div>
            </div>
            
            {/* 冊別篩選 */}
            {filterSubject !== 'All' && CURRICULUM_DB[filterSubject]?.hasVolume && availableVolumes.length > 1 && (
              <div className="flex gap-3 w-[98%] max-w-[1400px] mx-auto pt-2 overflow-x-auto scrollbar-hide pb-2">
                {availableVolumes.map(vol => (
                  <button key={vol} onClick={() => handleVolumeChange(vol)}
                    className={`px-4 py-2 rounded-full text-sm font-bold transition-colors flex-shrink-0 ${filterVolume === vol ? 'bg-[#b45309] text-white shadow-md' : 'bg-gray-50 text-gray-600 hover:bg-gray-200 border border-gray-200'}`}>
                    {vol === 'All' ? '全部冊別' : vol}
                  </button>
                ))}
              </div>
            )}

            {/* 次標題篩選 */}
            {filterSubject !== 'All' && availableSubSubjects.length > 1 && (
              <div className="flex gap-3 w-[98%] max-w-[1400px] mx-auto pt-4 border-t border-gray-100 border-dashed overflow-x-auto scrollbar-hide pb-2">
                {availableSubSubjects.map(subSub => (
                  <button key={subSub} onClick={() => setFilterSubSubject(subSub)}
                    className={`px-4 py-2 rounded-full text-sm font-bold transition-colors flex-shrink-0 ${filterSubSubject === subSub ? 'bg-amber-600 text-white shadow-md' : 'bg-gray-50 text-gray-600 hover:bg-gray-200 border border-gray-200'}`}>
                    {subSub === 'All' ? '全部單元' : subSub}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div id="print-area" className="p-4 md:p-5 print:p-0 w-[98%] max-w-[1400px] mx-auto space-y-8 print:space-y-0 bg-[#fffbeb] print:bg-white">
            
            <div className="hidden print:block text-center mb-8 print-header border-b-2 border-black pb-4">
              <h1 className="text-4xl font-bold text-black">
                {currentProfile} 的 {filterSubject === 'All' ? '綜合' : filterSubject} 
                {filterVolume !== 'All' && ` - ${filterVolume}`}
                {filterSubSubject !== 'All' && ` - ${filterSubSubject}`} 錯題本
              </h1>
              <p className="text-gray-500 mt-2 text-lg">列印日期：{new Date().toLocaleDateString()}</p>
            </div>

            {filteredData.length === 0 ? (
               <div className="text-center py-24 text-gray-400 no-print">
                  <div className="flex justify-center mb-5 scale-150"><Icons.Cloud /></div>
                  <p className="mt-5 text-2xl font-bold">🔍 找不到符合條件的錯題</p>
               </div>
            ) : (
              filteredData.map((item, index) => (
                <div key={item.id} className="bg-white p-7 print-card rounded-2xl shadow-sm border border-gray-200 print:shadow-none print:border-black break-inside-avoid print:bg-white">
                  <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-5 print:mb-3">
                    
                    {/* 分類與熟練度顯示 (列印時保留) */}
                    <div className="flex items-start gap-3 sm:gap-4 w-full">
                        {/* 明顯的獨立流水題號 */}
                        <div className="text-4xl print:text-3xl font-black text-[#f59e0b] print:text-black leading-none pt-1">
                          {String(index + 1).padStart(2, '0')}
                        </div>
                        
                        <div className="flex flex-wrap gap-3 print:gap-1.5 items-center w-full">
                            <span className="bg-amber-50 print:bg-transparent print:border print:border-black text-[#b45309] print:text-black px-4 py-1.5 print:px-2 print:py-0.5 rounded-full text-base print:text-sm font-bold border border-amber-200">
                              {item.subject} {item.volume ? item.volume : ''}
                            </span>
                            {item.sub_subject && (
                              <span className="bg-gray-100 print:bg-transparent print:border print:border-black text-gray-700 print:text-black px-4 py-1.5 print:px-2 print:py-0.5 rounded-full text-base print:text-sm font-semibold">{item.sub_subject}</span>
                            )}
                            <span className="bg-gray-100 print:bg-transparent print:border print:border-black text-gray-800 print:text-black px-4 py-1.5 print:px-2 print:py-0.5 rounded-full text-base print:text-sm font-bold">🎯 {item.concept}</span>
                            
                            {/* 顯示並在網頁端提供點擊切換熟練度 */}
                            <button 
                              onClick={() => handleUpdateMastery(item.id, item.mastery)}
                              className={`no-print sm:ml-auto px-4 py-1.5 rounded-full text-base font-bold transition-colors border shadow-sm flex items-center gap-2 ${(!item.mastery || item.mastery === 'need_review') ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-green-50 text-green-600 border-green-200 hover:bg-green-100'}`}
                              title="點擊切換熟練度"
                            >
                              {(!item.mastery || item.mastery === 'need_review') ? '🔴 需複習' : '🟢 已掌握'}
                            </button>
                        </div>
                    </div>

                    {/* 操作按鈕 - 僅在網頁顯示 */}
                    <div className="flex items-center gap-2 self-end sm:self-auto no-print flex-shrink-0">
                        <button onClick={() => onFullEdit(item)} className="text-gray-500 hover:text-[#f59e0b] bg-gray-100 hover:bg-amber-50 px-3 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-1 shadow-sm" title="完整編輯內容"><Icons.Edit /> 完整編輯</button>
                        <button onClick={() => handleDelete(item.id)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="刪除錯題"><Icons.Trash /></button>
                    </div>
                  </div>
                  
                  {/* 列印時保留影像 (移除了 print:hidden) */}
                  <div className="mb-5 bg-white">
                     <img 
                       src={item.image} 
                       alt="Question" 
                       className="max-w-full h-auto border border-gray-200 rounded-xl print:border-none print-img mx-auto print:ml-0 print:mr-auto block bg-white" 
                       style={item.printWidth ? { width: `${item.printWidth}px` } : {}}
                     />
                  </div>

                  {/* 列印時強制隱藏 AI 教學與筆記 */}
                  {(item.ai_tutor || item.answer || item.notes) && (
                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-200 print:hidden space-y-5">
                      {(item.ai_tutor || item.answer) && (
                        <div>
                          <div className="font-bold text-gray-800 text-xl mb-2 flex items-center justify-between cursor-pointer" onClick={() => toggleSection(item.id, 'ai')}>
                             <div className="flex items-center gap-2">🤖 AI老師教學 / 解答</div>
                             <button className="text-gray-500 hover:text-amber-600 transition-colors no-print font-bold flex items-center gap-1">
                                 {expandedSections[`${item.id}_ai`] ? '🐾 收起' : '✨ 顯示'}
                             </button>
                          </div>
                          {expandedSections[`${item.id}_ai`] && (
                              <div className="text-gray-800 text-lg bg-white/60 p-4 rounded-xl shadow-sm border border-amber-100/50">
                                 <LatexText content={item.ai_tutor || item.answer} className="whitespace-pre-wrap leading-relaxed" />
                              </div>
                          )}
                        </div>
                      )}
                      {item.notes && (
                        <div>
                          <div className="font-bold text-[#b45309] text-xl mb-2 flex items-center justify-between cursor-pointer" onClick={() => toggleSection(item.id, 'note')}>
                             <div className="flex items-center gap-2">📝 錯題筆記 / 訂正過程</div>
                             <button className="text-gray-500 hover:text-amber-600 transition-colors no-print font-bold flex items-center gap-1">
                                 {expandedSections[`${item.id}_note`] ? '🐾 收起' : '✨ 顯示'}
                             </button>
                          </div>
                          {expandedSections[`${item.id}_note`] && (
                              <img src={item.notes} alt="Handwritten Notes" className="w-full h-auto object-contain bg-white border border-amber-200 rounded-xl shadow-sm" style={{ maxHeight: '600px' }} />
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))
            )}
            
            <div className="no-print text-center py-8 text-base text-gray-400 font-bold">
              💡 列印時會自動隱藏解析與筆記，產生極簡版錯題卷。<br/>若點擊「輸出 PDF」無反應，請使用瀏覽器右上角的「分享」>「列印」功能。
            </div>
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
