<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2027 決戰會考</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 列印專用樣式 */
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; }
      .no-print { display: none !important; }
      @page { margin: 0.5cm; size: A4 portrait; }
      .print-card { padding: 0.5rem !important; margin-bottom: 2rem !important; border: none !important; box-shadow: none !important; }
      .print-img { width: 100% !important; max-height: none !important; object-fit: contain; }
      .print-header { margin-bottom: 1rem !important; padding-bottom: 0.5rem !important; }
    }
    
    /* 避免觸控裝置上的橡皮筋效果與選取 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }
  </style>
</head>
<body class="bg-[#fcf8f9]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 常數與顏色 ---
    const THEME = {
      primary: '#f1c6d2', 
      primaryHover: '#e6b7c4', 
      textPrimary: '#b86b81', 
      textDark: '#374151', 
      bg: '#fcf8f9',
      white: '#ffffff',
      red: '#e74c3c'
    };

    // --- SVG 圖示組件 ---
    const Icons = {
      Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /></svg>,
      Camera: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>,
      Scissors: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><line x1="20" y1="4" x2="8.12" y2="15.88" /><line x1="14.47" y1="14.48" x2="20" y2="20" /><line x1="8.12" y1="8.12" x2="12" y2="12" /></svg>,
      Eraser: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" /><path d="M22 21H7" /><path d="m5 11 9 9" /></svg>,
      Wand: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z" /><path d="m14 7 3 3" /><path d="M5 6v4" /><path d="M19 14v4" /><path d="M10 2v2" /><path d="M7 8H3" /><path d="M21 16h-4" /><path d="M11 3H9" /></svg>,
      Trash: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>,
      Printer: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></svg>,
      ArrowLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
      Contrast: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>,
      Cloud: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
      Settings: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    };

    // --- 主應用程式元件 ---
    function App() {
      // 系統與雲端狀態
      const [currentView, setCurrentView] = useState('login'); 
      const [apiKey, setApiKey] = useState('');
      const [fbConfig, setFbConfig] = useState(() => {
          const saved = localStorage.getItem('poppinsFbConfig');
          return saved ? JSON.parse(saved) : null;
      });
      const [FB, setFB] = useState(null); 
      const [user, setUser] = useState(null);
      const [isDbLoading, setIsDbLoading] = useState(false);
      const [dbError, setDbError] = useState('');
      
      // 工作區狀態
      const [rawImage, setRawImage] = useState(null);
      const [croppedImage, setCroppedImage] = useState(null);
      const [editedImage, setEditedImage] = useState(null);
      
      // AI 分類結果
      const [aiAnalysis, setAiAnalysis] = useState({ subject: '', sub_subject: '', concept: '' });
      const [loadingMsg, setLoadingMsg] = useState('');

      // --- 載入 Firebase 環境 ---
      useEffect(() => {
        if (!fbConfig) {
           return; 
        }

        setIsDbLoading(true);
        setDbError('');

        const loadFirebase = async () => {
          try {
            // 使用 new Function 避開 Babel 對 import() 的編譯，修正 require is not defined 錯誤
            const fbApp = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js")')();
            const fbAuth = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js")')();
            const fbDb = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")')();
            
            // 初始化 Firebase
            const app = fbApp.initializeApp(fbConfig);
            const auth = fbAuth.getAuth(app);
            const db = fbDb.getFirestore(app);
            const appId = fbConfig.projectId || '2027-exam-app';

            setFB({ ...fbApp, ...fbAuth, ...fbDb, db, auth, appId });

            // 處理匿名登入
            try {
               await fbAuth.signInAnonymously(auth);
            } catch (e) {
               setDbError("雲端認證失敗：" + e.message);
               setIsDbLoading(false);
            }

            // 監聽登入狀態
            fbAuth.onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setIsDbLoading(false);
            });

          } catch (e) {
            setDbError("加載 Firebase 模組失敗：" + e.message);
            setIsDbLoading(false);
          }
        };
        loadFirebase();
      }, [fbConfig]);

      useEffect(() => {
        const savedKey = localStorage.getItem('poppinsApiKey');
        if (savedKey) {
          setApiKey(savedKey);
          setCurrentView('dashboard');
        }
      }, []);

      const handleFbConfigSave = (config) => {
          localStorage.setItem('poppinsFbConfig', JSON.stringify(config));
          setFbConfig(config);
      };

      const handleLogin = (key) => {
        if (key.trim().length > 10) {
          localStorage.setItem('poppinsApiKey', key.trim());
          setApiKey(key.trim());
          setCurrentView('dashboard');
        } else {
          alert('請輸入有效的 Gemini API Key');
        }
      };

      const logout = () => {
        localStorage.removeItem('poppinsApiKey');
        setApiKey('');
        setCurrentView('login');
      };

      const resetFbConfig = () => {
        if(window.confirm('確定要清除雲端資料庫設定嗎？這不會刪除雲端資料，但需重新輸入金鑰才能連線。')) {
           localStorage.removeItem('poppinsFbConfig');
           setFbConfig(null);
           setFB(null);
           setUser(null);
           setCurrentView('login');
        }
      };

      const handleImageSelected = (dataUrl) => {
        setRawImage(dataUrl);
        setCurrentView('crop');
      };

      // 增強版 AI 分析：支援遇錯自動備援切換與高流量自動重試機制
      const callGeminiAI = async (base64Image) => {
        setLoadingMsg('AI 正在準備分析中...');
        setCurrentView('classify');
        
        try {
          const base64Data = base64Image.split(',')[1];
          const prompt = `你是一個台灣國中教育會考的專家。請分析這張錯題圖片，根據108課綱，判斷它的「科目」、「次標題/單元」和「核心知識」。
          請務必只回傳一個 JSON 格式的物件，不要包含其他文字說明或 Markdown 語法（例如 \`\`\`json ）。
          
          特別注意：
          1. 「次標題/單元」請使用【概略性且單一性的大單元分類】。例如只要跟平行線、內錯角、同側內角、平行四邊形、特殊四邊形有關的題目，都一律歸類為「平行與四邊形」。請勿創造過多細碎的次標題，以利後續篩選。
          2. 「核心知識」只限使用【繁體中文】回答，不可夾雜英文或其他語言。

          JSON 格式必須嚴格如下：
          {
            "subject": "科目名稱(例如：國文、數學、英文、理化、生物、地科、歷史、地理、公民)",
            "sub_subject": "次標題/大單元(例如：平行與四邊形、一元一次方程式、遺傳規律、台灣歷史等)",
            "concept": "核心知識(具體考點，限繁體中文)"
          }`;

          const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
          if (!modelsRes.ok) {
             const errData = await modelsRes.json().catch(() => ({}));
             throw new Error(errData.error?.message || '無法取得模型清單，請確認 API Key 是否有效。');
          }
          
          const modelsData = await modelsRes.json();
          const availableModels = modelsData.models
              ? modelsData.models.map(m => m.name.replace('models/', ''))
              : [];

          const preferredModels = [
              'gemini-2.5-flash',
              'gemini-1.5-flash', 
              'gemini-1.5-flash-latest', 
              'gemini-1.5-pro', 
              'gemini-1.5-pro-latest'
          ];

          let modelsToTry = preferredModels.filter(m => availableModels.includes(m));
          
          if (modelsToTry.length === 0) {
              modelsToTry = availableModels.filter(m => m.includes('gemini') && (m.includes('flash') || m.includes('pro') || m.includes('vision')));
          }

          if (modelsToTry.length === 0) {
               throw new Error('您的 API Key 沒有權限使用任何支援影像分析的模型。');
          }

          let successData = null;
          let lastErrorMsg = '';

          for (const targetModel of modelsToTry) {
            if (successData) break;
            
            const maxRetries = 3; 
            let delay = 2000; 

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              setLoadingMsg(`AI 分析中...\n(模型: ${targetModel}, 嘗試: ${attempt}/${maxRetries})`);
              
              try {
                const isOldVision = targetModel.includes('vision');
                const bodyPayload = {
                  contents: [{
                    parts: [
                      { text: prompt },
                      { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                    ]
                  }]
                };
                
                if (!isOldVision) {
                  bodyPayload.generationConfig = { responseMimeType: "application/json" };
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(bodyPayload)
                });

                if (response.ok) {
                  successData = await response.json();
                  break; 
                } else {
                  const errData = await response.json().catch(() => ({}));
                  lastErrorMsg = errData.error?.message || `模型 ${targetModel} 回傳未知錯誤`;
                  
                  if (response.status === 503 || response.status === 429 || lastErrorMsg.includes('high demand')) {
                    if (attempt < maxRetries) {
                      setLoadingMsg(`伺服器目前滿載...\n系統將在 ${delay/1000} 秒後自動重試\n請稍候...`);
                      await new Promise(res => setTimeout(res, delay));
                      delay *= 2; 
                      continue; 
                    }
                  } else {
                    break;
                  }
                }
              } catch (e) {
                 lastErrorMsg = e.message;
                 if (attempt < maxRetries) {
                    setLoadingMsg(`網路連線不穩...\n將在 ${delay/1000} 秒後自動重試`);
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                 }
              }
            } 
          } 

          if (!successData) {
            throw new Error(`所有可用模型經過多次重試後皆因高流量或無權限而失敗。\n最後錯誤原因：${lastErrorMsg}`);
          }

          const aiResponseText = successData.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (aiResponseText) {
            let parsed = { subject: '未分類', sub_subject: '未分類單元', concept: '未定單元' };
            try {
               const cleanedText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
               parsed = JSON.parse(cleanedText);
            } catch (e) {
               console.error("JSON Parse Error:", e, aiResponseText);
            }
            setAiAnalysis({
              subject: parsed.subject || '未分類',
              sub_subject: parsed.sub_subject || '未分類單元',
              concept: parsed.concept || '未定知識點'
            });
          }
        } catch (error) {
          console.error(error);
          alert('AI 分析失敗：\n' + error.message + '\n\n您可以先手動輸入分類。');
          setAiAnalysis({ subject: '手動分類', concept: '' });
        }
        
        setLoadingMsg('');
        setCurrentView('form');
      };

      // 儲存至雲端資料庫
      const saveMistake = async (formData) => {
        if (!user || !FB) {
          alert('尚未連線至雲端資料庫，無法儲存。');
          return;
        }

        setLoadingMsg('正在同步至雲端資料庫...');
        setCurrentView('classify'); // 借用 loading 畫面

        try {
          const colRef = FB.collection(FB.db, 'artifacts', FB.appId, 'users', user.uid, 'mistakes');
          await FB.addDoc(colRef, {
            ...formData,
            image: editedImage || croppedImage,
            timestamp: Date.now()
          });
          setLoadingMsg('');
          alert('儲存成功！已安全同步至雲端。');
          setCurrentView('dashboard');
        } catch (e) {
          setLoadingMsg('');
          alert('雲端儲存失敗：' + e.message);
          setCurrentView('form');
        }
      };

      // 渲染防呆攔截 1：若未設定 Firebase
      if (!fbConfig) {
          return <FbSetupView onSave={handleFbConfigSave} />;
      }

      // 渲染防呆攔截 2：若 Firebase 初始化中
      if (isDbLoading) {
        return <LoadingView message="正在連線至雲端資料庫..." />;
      }

      // 渲染防呆攔截 3：載入 Firebase 發生錯誤
      if (dbError) {
        return (
            <div className="min-h-screen font-sans text-gray-800 bg-[#fff5f7] flex items-center justify-center p-6">
               <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg text-center border-t-4 border-red-500">
                   <h2 className="text-2xl font-bold text-red-600 mb-4">資料庫連線失敗</h2>
                   <p className="text-gray-600 mb-6">{dbError}</p>
                   <button onClick={() => setFbConfig(null)} className="px-6 py-2 bg-gray-200 rounded-lg text-gray-700 font-bold hover:bg-gray-300">
                      重新設定 Firebase
                   </button>
               </div>
            </div>
        );
      }

      return (
        <div className="min-h-screen font-sans text-gray-800" style={{ backgroundColor: THEME.bg }}>
          {currentView === 'login' && <LoginView onLogin={handleLogin} onResetFb={resetFbConfig} />}
          {currentView === 'dashboard' && <DashboardView onSelectImage={handleImageSelected} onGoList={() => setCurrentView('list')} onLogout={logout} />}
          {currentView === 'crop' && <CropView imageUrl={rawImage} onCancel={() => setCurrentView('dashboard')} onComplete={(cropped) => { setCroppedImage(cropped); setCurrentView('edit'); }} />}
          {currentView === 'edit' && <EditView imageUrl={croppedImage} onCancel={() => setCurrentView('crop')} onComplete={(edited) => { setEditedImage(edited); callGeminiAI(edited); }} />}
          {currentView === 'classify' && <LoadingView message={loadingMsg} />}
          {currentView === 'form' && <FormView initialData={aiAnalysis} image={editedImage} onCancel={() => setCurrentView('edit')} onSave={saveMistake} />}
          {currentView === 'list' && <ListView onBack={() => setCurrentView('dashboard')} FB={FB} user={user} />}
        </div>
      );
    }

    // --- 首次 Firebase 設定畫面 ---
    function FbSetupView({ onSave }) {
        const [input, setInput] = useState('');
        const [error, setError] = useState('');

        const handleSave = () => {
            try {
                let cleanConfig = input.trim();
                if (!cleanConfig) throw new Error("請勿空白");

                // 嘗試擷取物件部分 (若使用者直接複製了 const firebaseConfig = {...})
                const match = cleanConfig.match(/\{[\s\S]*\}/);
                if (match) cleanConfig = match[0];

                // 寬鬆解析：為尚未加雙引號的 Key 加上雙引號，並將單引號轉為雙引號
                cleanConfig = cleanConfig.replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":');
                cleanConfig = cleanConfig.replace(/'/g, '"');
                // 移除可能的尾隨逗號
                cleanConfig = cleanConfig.replace(/,\s*}/g, '}');

                const configObj = JSON.parse(cleanConfig);

                if (!configObj.apiKey || !configObj.projectId) {
                    throw new Error("缺少必要欄位 (apiKey, projectId)，請確認您貼上的是正確的 firebaseConfig 物件。");
                }

                onSave(configObj);
            } catch (e) {
                setError("解析失敗，請確認格式正確。\n" + e.message);
            }
        };

        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#fff5f7]">
              <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-lg text-center">
                 <div className="bg-[#f1c6d2] text-[#374151] p-4 rounded-2xl inline-block mb-6 shadow-md">
                    <Icons.Settings />
                 </div>
                 <h1 className="text-3xl font-bold mb-4 text-[#b86b81]">雲端資料庫設定</h1>
                 <p className="text-gray-600 mb-6 text-sm text-left leading-relaxed">
                   歡迎使用！為了啟用跨裝置雲端同步功能，請將您的 <strong>Firebase 專案設定 (firebaseConfig)</strong> 貼在下方。<br/><br/>
                   安全保證：這些資料將<strong className="text-red-500">僅儲存於您的瀏覽器 LocalStorage 中</strong>，絕對不會寫入原始碼或外洩。
                 </p>
                 <textarea
                    className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#f1c6d2] text-sm font-mono h-48 mb-4 shadow-inner"
                    placeholder={`{\n  "apiKey": "AIzaSy...",\n  "authDomain": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}`}
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                 />
                 {error && <div className="text-red-500 text-sm mb-4 text-left whitespace-pre-wrap font-bold bg-red-50 p-3 rounded-lg border border-red-100">{error}</div>}
                 <button onClick={handleSave} className="w-full bg-[#f1c6d2] text-[#374151] py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-[#e6b7c4] transition-colors flex justify-center items-center gap-2">

    function CropView({ imageUrl, onCancel, onComplete }) {
      const containerRef = useRef(null);
      const imgRef = useRef(null);
      const [cropBox, setCropBox] = useState({ x: 10, y: 10, width: 80, height: 80 });
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [dragType, setDragType] = useState(null);

      const startDrag = (e, type) => {
        e.preventDefault();
        setIsDragging(true);
        setDragType(type);
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        setDragStart({ x: clientX, y: clientY, initialBox: { ...cropBox } });
      };

      const onDrag = useCallback((e) => {
        if (!isDragging || !containerRef.current) return;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const containerRect = containerRef.current.getBoundingClientRect();
        const dx = ((clientX - dragStart.x) / containerRect.width) * 100;
        const dy = ((clientY - dragStart.y) / containerRect.height) * 100;
        
        let newBox = { ...dragStart.initialBox };

        if (dragType === 'move') {
          newBox.x = Math.max(0, Math.min(100 - newBox.width, newBox.x + dx));
          newBox.y = Math.max(0, Math.min(100 - newBox.height, newBox.y + dy));
        } else {
          if (dragType.includes('n')) {
            const maxY = newBox.y + newBox.height - 5;
            newBox.y = Math.max(0, Math.min(maxY, newBox.y + dy));
            newBox.height = dragStart.initialBox.height - (newBox.y - dragStart.initialBox.y);
          }
          if (dragType.includes('s')) {
            newBox.height = Math.max(5, Math.min(100 - newBox.y, newBox.height + dy));
          }
          if (dragType.includes('w')) {
             const maxX = newBox.x + newBox.width - 5;
             newBox.x = Math.max(0, Math.min(maxX, newBox.x + dx));
             newBox.width = dragStart.initialBox.width - (newBox.x - dragStart.initialBox.x);
          }
          if (dragType.includes('e')) {
             newBox.width = Math.max(5, Math.min(100 - newBox.x, newBox.width + dx));
          }
        }
        setCropBox(newBox);
      }, [isDragging, dragStart, dragType]);

      const endDrag = () => { setIsDragging(false); setDragType(null); };

      useEffect(() => {
        if (isDragging) {
          window.addEventListener('mousemove', onDrag);
          window.addEventListener('mouseup', endDrag);
          window.addEventListener('touchmove', onDrag, { passive: false });
          window.addEventListener('touchend', endDrag);
        }
        return () => {
          window.removeEventListener('mousemove', onDrag);
          window.removeEventListener('mouseup', endDrag);
          window.removeEventListener('touchmove', onDrag);
          window.removeEventListener('touchend', endDrag);
        };
      }, [isDragging, onDrag]);

      const handleConfirm = () => {
        const canvas = document.createElement('canvas');
        const img = imgRef.current;
        
        const cropX = (cropBox.x / 100) * img.naturalWidth;
        const cropY = (cropBox.y / 100) * img.naturalHeight;
        const cropW = (cropBox.width / 100) * img.naturalWidth;
        const cropH = (cropBox.height / 100) * img.naturalHeight;

        canvas.width = cropW;
        canvas.height = cropH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
        
        onComplete(canvas.toDataURL('image/jpeg', 0.9));
      };

      return (
        <div className="fixed inset-0 bg-gray-900 flex flex-col z-50">
          <div className="flex justify-between items-center p-4 text-white bg-gray-800 shadow-md z-20">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="font-bold">第一步：裁切題目</span>
            <div className="w-8"></div>
          </div>
          
          <div className="flex-grow relative overflow-hidden flex items-center justify-center p-4">
            <div className="relative inline-block" style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)' }}>
                <img 
                  ref={imgRef} 
                  src={imageUrl} 
                  alt="To crop" 
                  className="block pointer-events-none" 
                  style={{ maxWidth: '100%', maxHeight: 'calc(100vh - 160px)', width: 'auto', height: 'auto' }}
                />
                <div ref={containerRef} className="absolute inset-0 touch-none">
                  <div 
                    className="absolute border-[3px] border-[#f1c6d2] shadow-[0_0_0_9999px_rgba(0,0,0,0.65)]"
                    style={{
                      top: `${cropBox.y}%`, left: `${cropBox.x}%`, 
                      width: `${cropBox.width}%`, height: `${cropBox.height}%`,
                    }}
                  >
                    <div className="absolute inset-0 cursor-move" onMouseDown={(e) => startDrag(e, 'move')} onTouchStart={(e) => startDrag(e, 'move')} />
                    <div className="absolute top-0 left-0 w-6 h-6 bg-[#f1c6d2] -mt-3 -ml-3 rounded-full cursor-nwse-resize z-10 shadow-sm" onMouseDown={(e) => startDrag(e, 'nw')} onTouchStart={(e) => startDrag(e, 'nw')} />
                    <div className="absolute top-0 right-0 w-6 h-6 bg-[#f1c6d2] -mt-3 -mr-3 rounded-full cursor-nesw-resize z-10 shadow-sm" onMouseDown={(e) => startDrag(e, 'ne')} onTouchStart={(e) => startDrag(e, 'ne')} />
                    <div className="absolute bottom-0 left-0 w-6 h-6 bg-[#f1c6d2] -mb-3 -ml-3 rounded-full cursor-nesw-resize z-10 shadow-sm" onMouseDown={(e) => startDrag(e, 'sw')} onTouchStart={(e) => startDrag(e, 'sw')} />
                    <div className="absolute bottom-0 right-0 w-6 h-6 bg-[#f1c6d2] -mb-3 -mr-3 rounded-full cursor-nwse-resize z-10 shadow-sm" onMouseDown={(e) => startDrag(e, 'se')} onTouchStart={(e) => startDrag(e, 'se')} />
                  </div>
                </div>
            </div>
          </div>

          <div className="p-6 bg-white rounded-t-3xl flex gap-4 justify-between items-center shadow-lg z-20">
             <button onClick={onCancel} className="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold flex-1">重新選圖</button>
             <button onClick={handleConfirm} className="px-6 py-3 bg-[#f1c6d2] text-[#374151] rounded-xl font-bold flex-1 flex justify-center items-center gap-2 hover:bg-[#e6b7c4] transition-colors">下一步 <Icons.Scissors/></button>
          </div>
        </div>
      );
    }

    function EditView({ imageUrl, onCancel, onComplete }) {
      const canvasRef = useRef(null);
      const [isErasing, setIsErasing] = useState(false);
      const [mode, setMode] = useState('none');

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          // 為了順利存入雲端且符合 1MB 限制，將最大寬度限制在 1000
          const maxWidth = 1000;
          let w = img.width;
          let h = img.height;
          if (w > maxWidth) {
            h = (maxWidth / w) * h;
            w = maxWidth;
          }
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);
        };
        img.src = imageUrl;
      }, [imageUrl]);

      const startDrawing = (e) => {
        if (mode !== 'eraser') return;
        setIsErasing(true);
        draw(e);
      };
      const stopDrawing = () => { setIsErasing(false); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); };
      const draw = (e) => {
        if (!isErasing || mode !== 'eraser') return;
        e.preventDefault();
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        ctx.lineWidth = 40 * scaleX;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ffffff';
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const handleRemoveRed = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          
          if (r > 130 && g < 100 && b < 100) {
            data[i] = 255;
            data[i+1] = 255;
            data[i+2] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      const handleRemoveBackground = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        const threshold = 170; 
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          
          const luminance = 0.299 * r + 0.587 * g + 0.114 * b;
          
          if (luminance > threshold) {
            data[i] = 255;
            data[i+1] = 255;
            data[i+2] = 255;
          } else {
            data[i] = Math.max(0, r - 40);
            data[i+1] = Math.max(0, g - 40);
            data[i+2] = Math.max(0, b - 40);
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      // 儲存時將圖片壓縮品質設定為 0.8 以避免雲端超出大小限制
      return (
        <div className="fixed inset-0 bg-gray-100 flex flex-col z-50">
           <div className="flex justify-between items-center p-4 bg-white shadow-sm z-10">
            <button onClick={onCancel} className="p-2"><Icons.ArrowLeft /></button>
            <span className="font-bold text-gray-800">第二步：影像處理</span>
            <button onClick={() => onComplete(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="px-4 py-2 bg-[#f1c6d2] hover:bg-[#e6b7c4] transition-colors text-[#374151] rounded-lg text-sm font-bold">
              完成
            </button>
          </div>

          <div className="flex-grow overflow-auto flex items-center justify-center p-4 touch-none">
            <canvas 
              ref={canvasRef}
              className="max-w-full max-h-full shadow-md bg-white border border-gray-300"
              style={{ touchAction: mode === 'eraser' ? 'none' : 'auto' }}
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseOut={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
            />
          </div>

          <div className="bg-white p-4 pb-8 flex justify-center gap-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
            <button 
              onClick={() => setMode(mode === 'eraser' ? 'none' : 'eraser')}
              className={`flex flex-col items-center gap-2 p-3 rounded-xl transition-colors ${mode === 'eraser' ? 'bg-[#f1c6d2] text-[#374151]' : 'text-gray-600 hover:bg-gray-100'}`}
            >
              <Icons.Eraser />
              <span className="text-xs font-bold">手動橡皮擦</span>
            </button>
            
            <button 
              onClick={handleRemoveRed}
              className="flex flex-col items-center gap-2 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors"
            >
              <Icons.Wand />
              <span className="text-xs font-bold">一鍵去紅筆</span>
            </button>

            <button 
              onClick={handleRemoveBackground}
              className="flex flex-col items-center gap-2 p-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-colors"
            >
              <Icons.Contrast />
              <span className="text-xs font-bold">一鍵去背景</span>
            </button>
          </div>
        </div>
      );
    }

    function ListView({ onBack, FB, user }) {
      const [mistakes, setMistakes] = useState([]);
      const [filterSubject, setFilterSubject] = useState('All');
      const [filterSubSubject, setFilterSubSubject] = useState('All');
      const [isFetching, setIsFetching] = useState(true);
      
      // 從雲端即時載入資料
      useEffect(() => {
        if (!user || !FB) return;
        setIsFetching(true);
        const colRef = FB.collection(FB.db, 'artifacts', FB.appId, 'users', user.uid, 'mistakes');
        const unsubscribe = FB.onSnapshot(colRef, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 在前端進行排序
            data.sort((a, b) => b.timestamp - a.timestamp);
            setMistakes(data);
            setIsFetching(false);
        }, (error) => {
            console.error("雲端讀取錯誤:", error);
            alert("雲端讀取失敗，請確認網路連線");
            setIsFetching(false);
        });

        return () => unsubscribe();
      }, [user, FB]);

      const handleDelete = async (id) => {
        if (!user || !FB) return;
        if(window.confirm('確定要從雲端刪除這題嗎？(刪除後無法復原)')) {
          try {
            await FB.deleteDoc(FB.doc(FB.db, 'artifacts', FB.appId, 'users', user.uid, 'mistakes', id));
          } catch(e) {
            alert('刪除失敗');
          }
        }
      };

      const handleSubjectChange = (sub) => {
        setFilterSubject(sub);
        setFilterSubSubject('All'); 
      };

      const subjects = ['All', ...new Set(mistakes.map(m => m.subject))];
      const availableSubSubjects = filterSubject === 'All' 
         ? [] 
         : ['All', ...new Set(mistakes.filter(m => m.subject === filterSubject).map(m => m.sub_subject || '未分類單元'))];

      let filteredData = mistakes;
      if (filterSubject !== 'All') {
        filteredData = filteredData.filter(m => m.subject === filterSubject);
        if (filterSubSubject !== 'All') {
          filteredData = filteredData.filter(m => (m.sub_subject || '未分類單元') === filterSubSubject);
        }
      }

      const handlePrint = () => {
        window.print();
      };

      if (isFetching) {
         return <LoadingView message="正在從雲端載入您的錯題本..." />;
      }

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-[#f1c6d2] text-[#374151] p-4 sticky top-0 z-10 shadow-md flex justify-between items-center no-print">
            <button onClick={onBack} className="p-2 hover:bg-[#e6b7c4] rounded-full transition-colors"><Icons.ArrowLeft /></button>
            <h1 className="font-bold text-xl flex items-center gap-2"><Icons.Cloud /> 雲端錯題本</h1>
            <button onClick={handlePrint} className="bg-white text-[#374151] px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-pink-50 transition-colors shadow-sm">
              <Icons.Printer /> 輸出 PDF
            </button>
          </div>

          <div className="p-4 overflow-x-auto whitespace-nowrap bg-white border-b no-print">
            <div className="flex gap-2 max-w-4xl mx-auto">
              {subjects.map(sub => (
                <button 
                  key={sub}
                  onClick={() => handleSubjectChange(sub)}
                  className={`px-4 py-2 rounded-full text-sm font-bold transition-colors ${filterSubject === sub ? 'bg-[#f1c6d2] text-[#374151]' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                >
                  {sub}
                </button>
              ))}
            </div>
            
            {filterSubject !== 'All' && availableSubSubjects.length > 1 && (
              <div className="flex gap-2 max-w-4xl mx-auto mt-3 pt-3 border-t border-gray-100 border-dashed overflow-x-auto">
                {availableSubSubjects.map(subSub => (
                  <button 
                    key={subSub}
                    onClick={() => setFilterSubSubject(subSub)}
                    className={`px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${filterSubSubject === subSub ? 'bg-[#b86b81] text-white shadow-sm' : 'bg-gray-50 text-gray-500 hover:bg-gray-200 border border-gray-200'}`}
                  >
                    {subSub === 'All' ? '全部單元' : subSub}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div id="print-area" className="p-4 print:p-0 max-w-4xl mx-auto space-y-6 print:space-y-0">
            
            <div className="hidden print:block text-center mb-8 print-header border-b-2 border-black pb-4">
              <h1 className="text-3xl font-bold">
                {filterSubject === 'All' ? '綜合' : filterSubject} 
                {filterSubSubject !== 'All' && ` - ${filterSubSubject}`} 錯題本
              </h1>
              <p className="text-gray-500 mt-2">列印日期：{new Date().toLocaleDateString()}</p>
            </div>

            {filteredData.length === 0 ? (
               <div className="text-center py-20 text-gray-400 no-print">
                  <div className="flex justify-center mb-4"><Icons.Cloud /></div>
                  <p className="mt-4 text-lg">雲端目前沒有符合的錯題紀錄</p>
               </div>
            ) : (
              filteredData.map((item, index) => (
                <div key={item.id} className="bg-white p-6 print-card rounded-2xl shadow-sm border border-gray-200 print:shadow-none print:border-black break-inside-avoid">
                  <div className="flex justify-between items-start mb-4 print:mb-2">
                    <div className="flex flex-wrap gap-2 items-center">
                      <span className="bg-[#fcf8f9] print:bg-transparent print:border print:border-black text-[#b86b81] print:text-black px-3 py-1 rounded-full text-sm font-bold border border-[#f1c6d2]">#{index + 1} {item.subject}</span>
                      {item.sub_subject && (
                         <span className="bg-pink-50 print:bg-transparent print:border print:border-black text-[#b86b81] print:text-black px-3 py-1 rounded-full text-sm font-semibold">{item.sub_subject}</span>
                      )}
                      <span className="bg-gray-100 print:bg-transparent print:border print:border-black text-gray-800 print:text-black px-3 py-1 rounded-full text-sm font-bold">🎯 {item.concept}</span>
                    </div>
                    <button onClick={() => handleDelete(item.id)} className="text-gray-400 hover:text-red-500 p-2 no-print transition-colors">
                      <Icons.Trash />
                    </button>
                  </div>
                  
                  <div className="mb-4 print:mb-2">
                     <img src={item.image} alt="Question" className="max-w-full h-auto border border-gray-100 rounded-lg print:border-none print-img" />
                  </div>

                  {(item.answer || item.notes) && (
                    <div className="bg-[#fcf8f9] print:bg-white p-4 print:p-2 print:pl-4 rounded-xl border border-[#f1c6d2] print:border-l-4 print:border-t-0 print:border-r-0 print:border-b-0 print:border-gray-800">
                      {item.answer && (
                        <div className="mb-3 print:mb-2">
                          <span className="font-bold text-gray-800 print:text-black text-lg">解答：</span>
                          <span className="text-gray-800 print:text-black text-lg whitespace-pre-wrap">{item.answer}</span>
                        </div>
                      )}
                      {item.notes && (
                        <div>
                          <span className="font-bold text-[#b86b81] print:text-black text-lg">筆記：</span>
                          <p className="text-gray-700 print:text-black text-lg whitespace-pre-wrap mt-1">{item.notes}</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
